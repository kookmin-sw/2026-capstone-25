    <div style="flex:1;display:flex;flex-direction:column;align-items:center;padding:28px 22px;gap:22px">
      <div style="text-align:center">
        <div style="font-size:13px;font-weight:600;color:var(--tx2);line-height:1.5;max-width:260px;margin:0 auto">
          ${S.curChunk?esc(S.curChunk.t):''}
        </div>
      </div>

      <!-- 직접 입력 -->
      <div style="display:flex;align-items:baseline;gap:8px">
        <input id="tp-min" type="number" min="1" max="180" value="${totalMin}"
          oninput="onTimerMinInput(this)" onblur="onTimerMinBlur(this)"
          style="width:120px;font-family:var(--font-display);font-size:54px;font-weight:800;color:var(--tx);
            text-align:center;border:none;border-bottom:2px solid var(--bd2);background:transparent;outline:none;padding:4px 0;letter-spacing:-1px">
        <span style="font-size:20px;font-weight:700;color:var(--mu)">분</span>
      </div>

      <!-- 슬라이더 (1분 단위) -->
      <div style="width:100%;display:flex;flex-direction:column;gap:6px">
        <input id="tp-slider" type="range" min="1" max="180" step="1" value="${totalMin}"
          oninput="onTimerSliderInput(this)" onchange="onTimerSliderChange(this)"
          style="width:100%;accent-color:var(--ac);cursor:pointer">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--mu)">
          <span>1분</span><span>60분</span><span>120분</span><span>180분</span>
        </div>
      </div>

      <!-- 빠른 선택 + 뽀모도로 (가로 정렬) -->
      <div style="display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap">
        ${chip(10)}${chip(20)}${chip(30)}
        <button onclick="setPomo()" style="padding:10px 14px;border-radius:12px;border:1.5px solid var(--bd);background:var(--sf);color:var(--tx);font-family:var(--font-body);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap">🍅 뽀모도로</button>
      </div>

      <div style="margin-top:auto;width:100%;display:flex;flex-direction:column;gap:10px">
        <button class="btn btn-p" onclick="startTimer()">집중 시작하기</button>
        <button class="btn-ghost" style="text-align:center;width:100%" onclick="goBack()">돌아가기</button>
      </div>
    </div>
  `;
}

function setTimerMin(min){
  min=Math.max(1,Math.min(180,min|0));
  S.timerH=Math.floor(min/60);S.timerM=min%60;S.timerS=0;
  rTimePick(document.getElementById('s-home'));
}
function onTimerMinInput(inp){
  // 실시간 슬라이더 동기화만 (강제 clamp는 blur에서)
  const v=parseInt(inp.value,10);
  if(!isNaN(v)){
    const slider=document.getElementById('tp-slider');
    if(slider) slider.value=Math.max(1,Math.min(180,v));
  }
}
function onTimerMinBlur(inp){
  let v=parseInt(inp.value,10);
  if(isNaN(v)||v<1) v=1;
  if(v>180) v=180;
  setTimerMin(v);
}
function onTimerSliderInput(sl){
  const v=parseInt(sl.value,10);
  const inp=document.getElementById('tp-min');
  if(inp) inp.value=v;
  S.timerH=Math.floor(v/60);S.timerM=v%60;S.timerS=0;
}
function onTimerSliderChange(sl){
  // change 이벤트(드래그 종료 시점)에만 전체 렌더로 칩 강조 갱신
  rTimePick(document.getElementById('s-home'));
}

function setPomo(){
  S.isPomo=true;S.pomoRound=0;S.pomoIsBreak=false;
  S.timerH=0;S.timerM=25;S.timerS=0;
  rTimePick(document.getElementById('s-home'));
}

/* ── Timer ── */
function startTimer(){
  if(S.timerRef) clearInterval(S.timerRef);
  S.timerTotalSec=S.timerH*3600+S.timerM*60+S.timerS;
  if(S.timerTotalSec===0){alert('시간을 설정해주세요.');return;}
  S.timerElapsed=0;S.timerOn=true;S.sessionMins=0;
  S.homeMode='timer';
  S.view='home';
  document.querySelectorAll('.nb[data-s]').forEach(b=>b.classList.toggle('on',b.dataset.s==='home'));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  const homeEl=document.getElementById('s-home');
  homeEl.classList.add('on');
  rTimerScreen(homeEl);

  S.timerRef=setInterval(()=>{
    if(!S.timerOn) return;
    S.timerElapsed++;
    if(S.timerElapsed>=S.timerTotalSec){
      clearInterval(S.timerRef);S.timerRef=null;
      S.timerOn=false;
      // 1분 미만이면 시간 미반영, 홈으로 이동
      if(S.timerTotalSec<60){
        S.isPomo=false;S.homeMode='input';rHome();return;
      }
      const elapsedMins=Math.ceil(S.timerTotalSec/60);
      S.sessionMins+=elapsedMins;
      S.totalMins+=elapsedMins;
      if(S.curChunk){const c=findChunk(S.curChunk.id);if(c) c.timeSpent+=elapsedMins;}
      updatePill();

      if(S.isPomo){
        S.pomoRound++;
        if(S.pomoIsBreak){
          S.pomoIsBreak=false;
          if(S.pomoRound>=8){S.isPomo=false;S.homeMode='done';rHome();return;}
          S.timerTotalSec=25*60;S.timerElapsed=0;S.timerOn=true;
          S.timerRef=setInterval(arguments.callee,1000);
          rTimerScreen(homeEl);return;
        } else {
          if(S.pomoRound>=8){S.isPomo=false;S.homeMode='done';rHome();return;}
          S.pomoIsBreak=true;S.timerTotalSec=5*60;S.timerElapsed=0;S.timerOn=true;
          S.timerRef=setInterval(arguments.callee,1000);
          rTimerScreen(homeEl);return;
        }
      }
      S.homeMode='done';rHome();return;
    }
    rTimerScreen(document.getElementById('s-home'));
  },1000);
}

function rTimerScreen(el){
  const rem=S.timerTotalSec-S.timerElapsed;
  const h=Math.floor(rem/3600),m=Math.floor((rem%3600)/60),s=rem%60;
  const pct=S.timerElapsed/S.timerTotalSec;
  const R=100,cx=120,cy=120,circ=2*Math.PI*R;
  const offset=circ*(1-pct);
  const isPaused=!S.timerOn;
  const pomoLabel=S.isPomo?(S.pomoIsBreak?'☕ 쉬는 시간':'🍅 뽀모도로 '+(Math.floor(S.pomoRound/2)+1)+'/4'):'';

  el.innerHTML=`
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 22px;gap:22px">
      ${pomoLabel?`<div style="font-size:13px;font-weight:700;color:var(--ac-d);background:var(--ac-s);padding:6px 14px;border-radius:10px">${pomoLabel}</div>`:''}
      <div style="font-size:13px;font-weight:600;color:var(--tx2);text-align:center;max-width:260px;line-height:1.5">
        ${S.curChunk?S.curChunk.t:''}
      </div>
      <div class="t-ring">
        <svg width="240" height="240" viewBox="0 0 240 240">
          <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="var(--bd)" stroke-width="9"/>
          <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="url(#tg)" stroke-width="9"
            stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"
            stroke-linecap="round" style="transition:stroke-dashoffset 1s linear"/>
          <defs><linearGradient id="tg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF7A4D"/><stop offset="100%" stop-color="#FF5722"/></linearGradient></defs>
        </svg>
        <div class="t-center">
          <div class="t-num">${h?String(h).padStart(2,'0')+':':''}${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</div>
          <div class="t-st" style="${isPaused?'color:var(--yl)':''}">${isPaused?'일시정지':'집중 중'}</div>
        </div>
      </div>
      <div class="timer-controls">
        <button class="timer-btn timer-btn-pause" onclick="toggleTimer()">
          ${isPaused?'▶ 계속하기':'⏸ 일시정지'}
        </button>
        <button class="timer-btn timer-btn-stop" onclick="endTimer()">
          ■ 종료
        </button>
      </div>
    </div>
  `;
}

function toggleTimer(){S.timerOn=!S.timerOn;rTimerScreen(document.getElementById('s-home'));}

function endTimer(){
  if(S.timerRef){clearInterval(S.timerRef);S.timerRef=null;}
  S.timerOn=false;
  S.isPomo=false;
  // 1분 미만이면 시간 미반영, 홈으로 이동
  if(S.timerElapsed<60){
    S.homeMode='input';rHome();return;
  }
  const elapsedMins=Math.ceil(S.timerElapsed/60);
  S.sessionMins+=elapsedMins;
  S.totalMins+=elapsedMins;
  if(S.curChunk){const c=findChunk(S.curChunk.id);if(c) c.timeSpent+=elapsedMins;}
  updatePill();
  S.homeMode='done';rHome();
}

/* ── Done ── */
function rDone(el){
  const chunkName=S.curChunk?S.curChunk.t:'완료';

  el.innerHTML=`
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 22px 0;text-align:center">
      <div style="font-size:52px;margin-bottom:18px">🎉</div>
      <div style="font-size:16px;font-weight:700;color:var(--tx);margin-bottom:20px;line-height:1.5;max-width:260px">${chunkName}</div>
      <div class="done-big">${fmtTime(S.sessionMins)}</div>
      <div style="font-size:13px;color:var(--mu);margin-top:8px">이번 세션 집중 시간</div>
    </div>
    <div style="padding:24px 22px;display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-p" onclick="pushNav();S.homeMode='timepick';rHome()">시간 연장하기</button>
      <button class="btn btn-d" onclick="markDoneAndGo()">할 일을 완료했어요!</button>
      <button class="btn-ghost" style="text-align:center;width:100%;padding:12px 0" onclick="finishSession()">다음에 이어서 할게요</button>
    </div>
  `;
}

function markDoneAndGo(){
  if(S.curChunk){const c=findChunk(S.curChunk.id);if(c) c.done=true;}
  const proj=S.curProj;
  S.curProj=null;S.curChunk=null;S.homeMode='input';
  // v2: 해당 할 일 상세 화면으로 이동
  if(proj){S.detailProj=proj;S.allMode='detail';}
  go('all',true);
}

function finishSession(){
  const proj=S.curProj;
  S.curProj=null;S.curChunk=null;S.homeMode='input';
  if(proj){S.detailProj=proj;S.allMode='detail';}
  go('all',true);
}

/* ═══════════════ ALL TAB ═══════════════ */
function rAll(){
  const el=document.getElementById('s-all');
  if(S.allMode==='detail'&&S.detailProj){rProjDetail(el);return;}

  // v2: 완료된 할 일도 사용자 본인이 직접 삭제할 수 있도록 숨기지 않는다.
  const active=S.projects.slice();
  const withDue=active.filter(p=>p.due).sort((a,b)=>new Date(a.due)-new Date(b.due));
  const noDue=active.filter(p=>!p.due);
  const totalTasks=active.length;
  const groups={};
  withDue.forEach(p=>{
    const key=p.due;
    if(!groups[key]) groups[key]=[];
    groups[key].push(p);
  });

  const completedCount=active.filter(p=>projProgress(p).pct===100).length;
  const inProgressCount=totalTasks-completedCount;
  el.innerHTML=`
    <div class="all-shell">
    <div class="all-list-wrap" style="padding:24px 22px;display:flex;flex-direction:column;gap:18px">
      <div class="all-topbar">
        <div class="ptitle">나의 할 일</div>
        <div class="all-metrics">
          <div class="all-metric"><div class="all-metric-label">진행중</div><div class="all-metric-num">${inProgressCount}</div></div>
          <div class="all-metric"><div class="all-metric-label">완료</div><div class="all-metric-num">${completedCount}</div></div>
        </div>
      </div>

      ${Object.keys(groups).length||noDue.length?`
        ${Object.entries(groups).map(([due,projs])=>`
          <div class="all-group">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 2px">
              ${dDayBadge(due)}
              <span style="font-size:12px;color:var(--mu);font-weight:600">${fmtDate(due)}</span>
            </div>
            <div class="all-group-grid">${projs.map(p=>renderProjCard(p)).join('')}</div>
          </div>
        `).join('')}

        ${noDue.length?`
          <div class="all-group">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 2px">
              <span class="dday dday-none">마감 X</span>
            </div>
            <div class="all-group-grid">${noDue.map(p=>renderProjCard(p)).join('')}</div>
          </div>
        `:''}
      `:`
        <div class="empty">
          <div class="empty-emoji">📋</div>
          <div class="empty-title">아직 할 일이 없어요</div>
          <div class="empty-sub">홈에서 첫 번째 할 일을 만들어보세요</div>
        </div>
      `}
    </div>
  `;
}

      <svg width="15" height="15" viewBox="0 0 18 18" fill="none"><path d="M3 4.5h12M6.5 4.5V3a1.5 1.5 0 011.5-1.5h2A1.5 1.5 0 0111.5 3v1.5M14.25 4.5v10.5a1.5 1.5 0 01-1.5 1.5h-7.5a1.5 1.5 0 01-1.5-1.5V4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>`;

  if(p.isSingle){
    const sc=(p.chunks&&p.chunks[0])||null;

    const singleMeta=sc?chunkStatusText(sc):'';
    return `
    <div class="card" style="padding:16px 18px;padding-right:44px;margin-bottom:10px;position:relative;${isDone?'opacity:.65':''}">
      ${delBtnHTML}
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="event.stopPropagation();toggleSingleDone(${p.id})" title="${isDone?'완료 취소':'완료 표시'}" style="width:22px;height:22px;border-radius:7px;border:2px solid ${isDone?p.color:'var(--bd)'};background:${isDone?p.color:'var(--sf)'};cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;transition:all .15s">
          ${isDone?'<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6.2l2.3 2.3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
        </button>
        <div style="width:10px;height:10px;border-radius:50%;background:${p.color};flex-shrink:0;box-shadow:0 0 0 3px ${p.color}25"></div>
        <div style="flex:1;min-width:0;display:flex;align-items:center;gap:8px">

      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <div style="font-size:15px;font-weight:700;color:var(--tx);${allDone?'text-decoration:line-through;color:var(--mu)':''}">${p.name}</div>
          ${allDone?'<span style="background:var(--gn-s);color:var(--gn);font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:7px">완료</span>':''}

/* ── Project Detail ── */
function showProjDetail(id){
  pushNav();
  S.detailProj=findProj(id);
  S.allMode='detail';
  S.confirmDelete=false;
  rAll();
}

/* 단일 작업 완료 토글 */
function toggleSingleDone(id){
  const p=findProj(id);if(!p||!p.isSingle||!p.chunks||!p.chunks[0]) return;
  p.chunks[0].done=!p.chunks[0].done;
  rAll();
}

/* v2: 목록 카드의 "시작" 버튼 진입점 */
function startFirstChunkFromList(id){
  const p=findProj(id);if(!p||!p.chunks||!p.chunks.length) return;
  pushNav();
  S.curProj=p;S.curChunk=p.chunks[0];
  S.homeMode='timepick';go('home',true);
}
function startNextChunkFromList(id){
  const p=findProj(id);if(!p) return;
  pushNav();
  S.curProj=p;S.curChunk=getNextChunk(p);
  S.homeMode='timepick';go('home',true);
}

/* v2: 상세 화면 평면 뷰에서 chunk 시작 */
function startFlatChunkFromDetail(id,i){
  const p=findProj(id);if(!p||!p.chunks||!p.chunks[i]) return;
  pushNav();
  S.curProj=p;S.curChunk=p.chunks[i];
  S.homeMode='timepick';go('home',true);
}

/* 세부 단계 시작 */
function startSubChunkFromDetail(projId, chunkIdx, subIdx){
  const proj=findProj(typeof projId==='string'?parseInt(projId,10):projId);

  const chunk=proj.chunks[chunkIdx];
  if(!chunk||!chunk.subChunks||!chunk.subChunks[subIdx]) return;

function editSubChunksFromDetail(projId, chunkIdx){
  const proj=findProj(projId);
  if(!proj||!proj.chunks?.[chunkIdx]?.subChunks?.length) return;
  pushNav();
  S.curProj=proj;
  S._editSubIdx=chunkIdx;
  S._editSubOriginal=JSON.parse(JSON.stringify(proj.chunks[chunkIdx].subChunks));
  S.originalChunks=JSON.parse(JSON.stringify(proj.chunks));
  proj.chunks=proj.chunks[chunkIdx].subChunks;
  S.editFromDetail=true;
  // detailSubMode 오염 방지
  S.detailSubMode=false;
  S._detailSubIdx=null;
  S._detailSubProjId=null;
  S._detailSubOriginalChunks=null;
  S.homeMode='editChunks';
  go('home',true);
}

function decomposeChunkFromDetail(projId, chunkIdx){
  const proj=findProj(projId);
  if(!proj||!proj.chunks?.[chunkIdx]) return;
  const chunk=proj.chunks[chunkIdx];
  if(chunk.subChunks&&chunk.subChunks.length) return;

  pushNav();
  S.curProj=proj;
  S._detailSubIdx=chunkIdx;
  S._detailSubProjId=projId;
  S._detailSubOriginalChunks=JSON.parse(JSON.stringify(proj.chunks));
  S._detailSubReturn='detail';
  S.detailSubMode=true;
  S.homeMode='loading';
  go('home',true);

  setTimeout(()=>{
    if(!S.detailSubMode||S._detailSubIdx!==chunkIdx) return;
    const steps=buildSubSteps(chunk.t,proj.name,proj.desc);
    proj.chunks=steps.map((t,si)=>({id:`${chunk.id}-s${si}`,t,guide:makeFallbackGuide(t,proj.name),done:false,timeSpent:0}));
    proj.reasoning={
      what:`"${chunk.t}" 단계를 더 작은 행동 단위로 나눴어요.`,
      how:'한 번에 처리하기 부담되지 않도록 준비 → 실행 → 확인 순서로 구성했어요.'
    };
    S.homeMode='chunks';rHome();
  },600);
}


/* v2: 소규모(단일/중간) 할 일 다시 쪼개기 */
function resplitProj(id){
  const p=findProj(id);if(!p) return;
  S.curProj=p;
  S.reasonOpen=false;
  S.chunksHistory=[];
  S.homeMode='loading';
  S.allMode='list';S.detailProj=null;
  go('home',true);
  setTimeout(()=>{
    const base=(p.chunks||[]).map(c=>c.t);
    // 데모: 살짝 섞어 새 버전 생성
    const shuffled=base.length>1?[...base].reverse():base;
    p.chunks=shuffled.map((t,i)=>({id:`${p.id}-${i}`,t,done:false,timeSpent:0}));
    p.reasoning={
      what:'기존 단계를 바탕으로 다시 구성했어요.',
      how:'순서와 표현을 다듬어 새 관점으로 제안해요.'
    };
    p.isSingle=false;
    S.homeMode='chunks';rHome();
  },700);
}

/* ═══════════════ CALENDAR TAB ═══════════════ */
function fmtYMD(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function startOfWeek(d){
  const x=new Date(d);x.setHours(0,0,0,0);
  x.setDate(x.getDate()-x.getDay()); // Sunday
  return x;
}
function getCalSelected(){
  if(!S.calSelected) S.calSelected=todayStr();
  return S.calSelected;
}
/* 투두 탭: 작은 할 일(chunk) 단위로 스케줄 관리 */
function findChunkById(cid){
  for(const p of S.projects){
    for(const c of (p.chunks||[])){
      if(c.id===cid) return {proj:p,chunk:c,parentChunk:null};
      if(c.subChunks&&c.subChunks.length){
        const sc=c.subChunks.find(x=>x.id===cid);
        if(sc) return {proj:p,chunk:sc,parentChunk:c};
      }
    }
  }
  return null;
}
function getSchedulableChunks(proj){
  const out=[];
  for(const c of (proj.chunks||[])){
    if(c.done) continue;
    if(c.subChunks&&c.subChunks.length){
      c.subChunks.filter(sc=>!sc.done).forEach(sc=>out.push({proj,chunk:sc,parentChunk:c}));
    }else{
      out.push({proj,chunk:c,parentChunk:null});
    }
  }
  return out;
}
function chunksOnDate(dateStr){
  const out=[];
  S.schedule.forEach(s=>{
    if(s.date!==dateStr) return;
    const fc=findChunkById(s.chunkId);
    if(fc) out.push(fc);
  });
  return out;
}
function dueProjectsOn(dateStr){
  return S.projects.filter(p=>p.due===dateStr);
}
function hasMarkerOnDate(dateStr){
  return dueProjectsOn(dateStr).length>0;
}

/* 투두 순서 유지 헬퍼: schedule 배열 내 같은 날짜 항목들의 배열 순서를 그대로 사용 */
function sortTodosByUserOrder(raw,date){
  const order=S.schedule.filter(s=>s.date===date).map(s=>s.chunkId);
  return raw.slice().sort((a,b)=>order.indexOf(a.chunk.id)-order.indexOf(b.chunk.id));
}

function showScheduleModal(chunkId){
  const today=todayStr();
  const now=new Date();
  const year=now.getFullYear(), month=now.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const dayNames=['일','월','화','수','목','금','토'];
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  const makeDs=(d)=>`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

  const cells=[];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);

  const root=document.getElementById('modal-root');
  root.classList.add('on');
  root.innerHTML=`
    <div class="modal-card" style="max-width:320px;padding:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="font-size:15px;font-weight:800;color:var(--tx)">언제 할까요?</div>
        <div style="font-size:13px;font-weight:700;color:var(--mu)">${year}년 ${monthNames[month]}</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">
        ${dayNames.map((d,i)=>`<div style="text-align:center;font-size:10px;font-weight:700;
          color:${i===0?'var(--rd)':i===6?'#3B82F6':'var(--mu)'};padding:4px 0">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px">
        ${cells.map((d,i)=>{
          if(!d) return `<div></div>`;
          const ds=makeDs(d);
          const isToday=ds===today;
          const isPast=ds<today;
          const isScheduled=S.schedule.some(s=>s.chunkId===chunkId&&s.date===ds);
          const dow=i%7;
          const isWeekend=dow===0||dow===6;
          return `<button onclick="scheduleChunkOnDate('${chunkId}','${ds}')"
            style="aspect-ratio:1;border-radius:8px;border:none;cursor:${isPast?'default':'pointer'};
              font-family:var(--font-body);font-size:12px;font-weight:${isToday||isScheduled?'800':'600'};
              background:${isScheduled?'var(--ac)':isToday?'var(--ac-s)':'transparent'};
              color:${isScheduled?'#fff':isToday?'var(--ac-d)':isPast?'var(--mu2)':isWeekend?(dow===0?'var(--rd)':'#3B82F6'):'var(--tx)'};
              opacity:${isPast?.4:1};transition:all .12s"
            ${!isPast?`onmouseover="if(!${isScheduled})this.style.background='var(--fa)'"
            onmouseout="if(!${isScheduled})this.style.background='transparent'"`:''}>
            ${d}
          </button>`;
        }).join('')}
      </div>
      <button class="btn-ghost" style="width:100%;text-align:center" onclick="closeModal()">닫기</button>
    </div>
  `;
}

function scheduleChunkOnDate(chunkId, date){
  const today=todayStr();
  if(date<today) return; // 과거 날짜 무시
  const already=S.schedule.some(s=>s.chunkId===chunkId&&s.date===date);
  if(already){
    S.schedule=S.schedule.filter(s=>!(s.chunkId===chunkId&&s.date===date));
  } else {
    S.schedule.push({id:Date.now(),chunkId,date});
  }
  showScheduleModal(chunkId);
}

/* v3: 일정 탭 todo 드래그 정렬 */
function initTodoDragSort(date,ctx){
  const containerId='todo-list-'+(ctx==='modal'?date+'-modal':date);
  const container=document.getElementById(containerId);
  if(!container) return;
  let dragEl=null,dragCid=null,startY=0;
  container.querySelectorAll('.todo-drag-handle').forEach(handle=>{
    handle.addEventListener('pointerdown',e=>{
      e.preventDefault();
      dragEl=handle.closest('.todo-row');
      if(!dragEl) return;
      dragCid=dragEl.dataset.chunk;
      startY=e.clientY;
      dragEl.style.opacity='.5';
      const onMove=ev=>{
        if(!dragEl) return;
        const rows=[...container.querySelectorAll('.todo-row')];
        const myIdx=rows.indexOf(dragEl);
        rows.forEach((row,j)=>{
          if(row===dragEl) return;
          const rect=row.getBoundingClientRect();
          const mid=rect.top+rect.height/2;
          if(ev.clientY<mid&&j<myIdx){reorderTodo(date,dragCid,-1,ctx);startY=ev.clientY;}
          else if(ev.clientY>mid&&j>myIdx){reorderTodo(date,dragCid,1,ctx);startY=ev.clientY;}
        });
      };
      const onUp=()=>{
        if(dragEl){dragEl.style.opacity='';dragEl=null;}
        document.removeEventListener('pointermove',onMove);
        document.removeEventListener('pointerup',onUp);
      };
      document.addEventListener('pointermove',onMove,{passive:true});
      document.addEventListener('pointerup',onUp);
    });
  });
}

function reorderTodo(date,cid,delta,ctx){
  const entries=S.schedule
    .map((s,i)=>({s,i}))
    .filter(x=>x.s.date===date);
  const idx=entries.findIndex(x=>x.s.chunkId===cid);
  const target=idx+delta;
  if(idx<0||target<0||target>=entries.length) return;
  const a=entries[idx].i,b=entries[target].i;
  [S.schedule[a],S.schedule[b]]=[S.schedule[b],S.schedule[a]];
  if(ctx==='modal') renderDayModal(); else rCalendar();
}

  const t=todayStr();

function removeScheduledChunk(cid,date,ctx){

  if(S._pendingScheduleChunk){
    const chunkId=S._pendingScheduleChunk;
    const already=S.schedule.some(s=>s.chunkId===chunkId&&s.date===ds);

        </div>
        ${quickAddBlock}
        <div class="modal-msg" style="text-align:left;margin-bottom:12px">할 일을 선택하세요</div>
        <div style="max-height:360px;overflow-y:auto;margin:0 -2px;padding:0 2px">
          ${hasAny?groupsHTML:'<div style="text-align:center;padding:24px;color:var(--mu);font-size:13px">진행 중인 할 일이 없어요</div>'}
        </div>
        <div class="modal-btns" style="margin-top:14px">
          <button class="modal-btn" onclick="closeSchedulePicker(event,true)">취소</button>
          <button class="modal-btn modal-btn-danger" onclick="confirmSchedulePicker()" ${selCount===0?'disabled style="opacity:.5"':''}>추가하기${selCount?` (${selCount})`:''}</button>
        </div>
      </div>
    </div>`;
  root.classList.add('on');
}
function toggleScheduleChunk(cid,checked){
  if(!S._scheduleDraft) S._scheduleDraft={};
  if(checked) S._scheduleDraft[cid]=S._schedulePickerDate;
  else delete S._scheduleDraft[cid];
  renderSchedulePicker();
}
function closeSchedulePicker(e){
  if(e) e.stopPropagation();
  const root=document.getElementById('modal-root');
  root.classList.remove('on');
  S._scheduleDraft=null;
  S._schedulePickerDate=null;
  S._pickerQuickOpen=false;
  S._pickerQuickText='';
  setTimeout(()=>{if(!root.classList.contains('on'))root.innerHTML='';},180);
}
function updatePickerAddBtn(){
  const btn=document.getElementById('pickerQuickAddBtn');if(!btn) return;
  const has=(S._pickerQuickText||'').trim().length>0;
  btn.disabled=!has;
  btn.style.opacity=has?'1':'.4';
  btn.style.cursor=has?'pointer':'not-allowed';
}
function togglePickerQuickAdd(){
  S._pickerQuickOpen=!S._pickerQuickOpen;
  if(!S._pickerQuickOpen){S._pickerQuickText='';S._pickerQuickDue='';}
  renderSchedulePicker();
  if(S._pickerQuickOpen){
    setTimeout(()=>{const el=document.getElementById('pickerQuickInput');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}},30);
  }
}
function submitPickerQuickAdd(){
  const name=(S._pickerQuickText||'').trim();
  if(!name){togglePickerQuickAdd();return;}
  const date=S._schedulePickerDate||todayStr();
  // 새 단일 프로젝트 생성
  const singlePalette=['#F59E0B','#EF4444','#3B82F6','#10B981','#8B5CF6','#EC4899','#14B8A6','#F97316'];
  const color=singlePalette[S.projects.length%singlePalette.length];
  const newId=Math.max(0,...S.projects.map(p=>p.id||0))+1;
  const chunkId=newId+'-0';
  const due=(S._pickerQuickDue||'').trim()||null;
  S.projects.push({
    id:newId,name:name,color:color,startDate:todayStr(),due:due,isSingle:true,
    chunks:[{id:chunkId,t:name,done:false,timeSpent:0}]
  });
  // 리스트에 바로 선택(체크)되도록 draft에 추가 (스케줄에는 '추가하기' 클릭 시 반영)
  if(!S._scheduleDraft) S._scheduleDraft={};
  S._scheduleDraft[chunkId]=date;
  S._pickerQuickOpen=false;
  S._pickerQuickText='';
  S._pickerQuickDue='';
  renderSchedulePicker();
}
function confirmSchedulePicker(){
  const d=S._scheduleDraft||{};
  const date=S._schedulePickerDate;
  Object.keys(d).forEach(cid=>{
    if(!S.schedule.some(s=>s.chunkId===cid&&s.date===date)){
      S.schedule.push({id:Date.now()+Math.random(),chunkId:cid,date});
    }
  });
  closeSchedulePicker();
  rCalendar();
}

/* ═══════════════ RECORD TAB ═══════════════ */
function rRecord(){
  const el=document.getElementById('s-record');

  /* ── 실제 데이터 ── */
  const allChunks=S.projects.flatMap(p=>(p.chunks||[]).map(c=>({proj:p,chunk:c})));
  const realDone=allChunks.filter(x=>x.chunk.done).length;
  const realMins=allChunks.reduce((s,x)=>s+(x.chunk.timeSpent||0),0);

  /* ── 이번 주 날짜 범위 계산 (월~일 기준) ── */
  const now=new Date();
  const dow=now.getDay();
  const monOffset=dow===0?-6:1-dow;
  const mon=new Date(now); mon.setDate(now.getDate()+monOffset);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  const weekRangeLabel=`${fmt(mon)} – ${fmt(sun)}`;

  /* ── 더미 주간 데이터 — 현재 월요일 기준 역산 ── */
  const weekLabel=(offsetWeeks)=>{
    const d=new Date(mon);
    d.setDate(mon.getDate()+offsetWeeks*7);
    return `${d.getMonth()+1}/${d.getDate()}`;
  };
  const WEEKS=[
    {label:`${weekLabel(-3)}~`, mins:42,  done:3},
    {label:`${weekLabel(-2)}~`, mins:78,  done:6},
    {label:`${weekLabel(-1)}~`, mins:110, done:9},
    {label:`${weekLabel(0)}~`,  mins:Math.max(realMins,134), done:Math.max(realDone,11)},
  ];
  const thisW=WEEKS[3], lastW=WEEKS[2];
  const diffMins=thisW.mins-lastW.mins;
  const diffDone=thisW.done-lastW.done;
  const maxMins=Math.max(...WEEKS.map(w=>w.mins));
  const maxDone=Math.max(...WEEKS.map(w=>w.done));

  /* ── 프로젝트별 집중 시간 ── */
  const byProj=S.projects.length>=2
    ? S.projects.map(p=>({
        name:p.name, color:p.color,
        mins:(p.chunks||[]).reduce((s,c)=>s+(c.timeSpent||0),0),
        done:(p.chunks||[]).filter(c=>c.done).length,
        inProgress:(p.chunks||[]).filter(c=>!c.done&&(c.timeSpent||0)>0).map(c=>({t:c.t,mins:c.timeSpent||0})),
        total:(p.chunks||[]).length,
      })).filter(x=>x.total>0).sort((a,b)=>b.mins-a.mins)
    : [
        {name:'팀플 발표 준비', color:'#FF6B3D', mins:46, done:1, total:4,
          inProgress:[{t:'슬라이드 흐름 다시 정리', mins:22}]},
        {name:'마케팅 과제 보고서 초안', color:'#3B82F6', mins:28, done:0, total:4,
          inProgress:[{t:'본문 초안 이어 쓰기', mins:18}]},
        {name:'포트폴리오 사이트 제작', color:'#22A560', mins:44, done:1, total:5,
          inProgress:[{t:'전체 구조 설계', mins:20}]},
      ];

  /* ── 이번 주 완료 항목 (더미 포함) ── */
  const realDoneItems=allChunks.filter(x=>x.chunk.done).slice(0,6);
  const DUMMY_DONE=[
    {t:'참고 사이트 5개 저장하기',   proj:'포트폴리오 사이트 제작', color:'#22A560', mins:24},
    {t:'발표 오프닝 멘트 수정',      proj:'팀플 발표 준비',     color:'#FF6B3D', mins:25},
    {t:'과제 표지와 목차 형식 정리', proj:'마케팅 과제 보고서 초안', color:'#3B82F6', mins:20},
    {t:'발표 대본 연결 구간 체크',   proj:'팀플 발표 준비',     color:'#FF6B3D', mins:15},
    {t:'장보기 필수 품목 다시 적기', proj:'자취방 장보기 메모', color:'#F59E0B', mins:10},
  ];
  const doneItems=realDoneItems.length>=3
    ? realDoneItems.map(x=>({t:x.chunk.t, proj:x.proj.name, color:x.proj.color, mins:x.chunk.timeSpent||0}))
    : DUMMY_DONE;

  /* ── 해석 생성 ── */
  const topProj=byProj[0];
  const stalledProj=byProj.find(p=>p.mins<10&&p.total>0);
  const isGrowing=diffMins>0&&diffDone>0;
  const isSlowing=diffMins<0||diffDone<0;
  const headline=isGrowing?'흐름이 붙고 있어요':isSlowing?'이번 주는 조금 쉬어갔어요':'꾸준히 나아가고 있어요';

  /* 잘한 점 / 아쉬운 점 */
  const goods=[];

    goods.push(`${topProj.name}에서 ${topProj.done}개를 끝냈어요`);
  if(diffMins>0)
    goods.push(`지난주보다 ${fmtTime(diffMins)} 더 집중했어요`);
  if(diffDone>0)

    bads.push(`${stalledProj.name}은 거의 손을 못 댔어요`);
  if(diffMins<0)
    bads.push(`집중 시간이 지난주보다 ${fmtTime(Math.abs(diffMins))} 줄었어요`);

  /* ── 4주 차트 HTML ── */
  const chartHtml=WEEKS.map((w,i)=>{

  /* ── 프로젝트별 완료 항목 매핑 ── */
  const doneByProj={};
  if(realDoneItems.length>=3){
    realDoneItems.forEach(x=>{
      if(!doneByProj[x.proj.name]) doneByProj[x.proj.name]=[];

      ${hasItems?`

          <span style="flex:1;font-size:14px;font-weight:600;color:var(--tx)">테마</span>
          <span style="font-size:13px;color:var(--mu);font-weight:600">라이트</span>
        </div>
        <div class="tr" style="cursor:default;border-bottom:none">
          <span style="flex:1;font-size:14px;font-weight:600;color:var(--tx)">버전</span>
          <span style="font-size:13px;color:var(--mu);font-weight:600">v1.0</span>
        </div>
      </div>
    </div>
  `;
}

/* ═══════════════ TASK ADD (v2: 규모 감지 + 마일스톤 분기, 템플릿 통합) ═══════════════ */
async function doAddTask(){
  const titleEl=document.getElementById('task-title');
  const descEl=document.getElementById('task-desc');
  const startEl=document.getElementById('start-date');
  const dueEl=document.getElementById('due-date');
  const title=titleEl?.value?.trim();
  if(!title){titleEl?.focus();return;}
  const desc=descEl?.value?.trim()||'';
  const startDate=startEl?.value||null;
  const due=dueEl?.value||null;

  // 템플릿 선택 상태 (설계서 §6.1~6.5 참조)
  const tpl=S.selectedTemplate?getTemplateById(S.selectedTemplate):null;

  // v2: 입력값 보존 (돌아가기 후에도 복원)
  S.lastInput={title,desc,startDate,due,wantSplit:S.formWantSplit,fileName:S.formFile?.name||null};

  const colorIdx=S.projects.length%COLORS.length;
  const newProj={
    id:Date.now(),
    name:title.length>28?title.slice(0,28)+'…':title,
    desc,
    color:COLORS[colorIdx],
    startDate,due,
    isSingle:!S.formWantSplit,
    reasoning:null,
    templateId:tpl?tpl.id:null,
    templateName:tpl?tpl.name:null,
    chunks:[]
  };

  if(!S.formWantSplit){
    newProj.chunks=[{id:`${newProj.id}-0`,t:title.slice(0,40),done:false,timeSpent:0}];
    S.projects.unshift(newProj);
    S.lastInput=null;
    S.selectedTemplate=null;            // 확정 시 템플릿 바인딩 해제
    S.homeMode='input';
    S.allMode='list';
    go('all',true);
    return;
  }

  S.curProj=newProj;
  S.homeMode='loading';rHome();

  // Claude API로 쪼개기
  const {chunks,reasoning}=await demoDecompose(title,desc,S.formFile,tpl);
  newProj.chunks=chunks.map((c,i)=>({id:`${newProj.id}-${i}`,t:c.t,guide:c.guide,done:false,timeSpent:0}));
  newProj.reasoning=reasoning;
  S.projects.unshift(newProj);
  S.homeMode='chunks';rHome();
}

/* ══════════════════════════════════════════════════════
   AI 쪼개기 — Claude API 실제 호출
   ① demoDecompose : 할 일 → 단계 분해 (title + desc + 템플릿 완전 반영)
   ② generateChunkGuide : 단계 → 실행 가이드 (단계 이름 + 프로젝트 맥락 반영)
   ══════════════════════════════════════════════════════ */

async function callClaude(systemPrompt, userPrompt){
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      system: systemPrompt,
      messages:[{role:'user', content: userPrompt}]
    })
  });
  if(!res.ok) throw new Error('API '+res.status);
  const data = await res.json();
  return data.content.map(b=>b.type==='text'?b.text:'').join('');
}

async function demoDecompose(title, desc, file, tpl){
  const systemPrompt =
`당신은 할 일을 실행 가능한 단계로 쪼개주는 도우미입니다.
사용자가 입력한 정보를 분석해서 3~6개의 구체적인 실행 단계로 나눠주세요.

핵심 규칙:
- 단계 이름은 15자 이내로 (예: "운영체제 기출 풀기", "오답 노트 정리", "제출 형식 확인")
- 설명에 과목명·범위 등 핵심 정보가 있으면 단계 이름에 반영하세요
- 템플릿 흐름이 있으면 그 구조를 기반으로 하되, 입력한 내용에 맞게 개인화하세요
- 각 단계는 "오늘 바로 시작할 수 있는 행동"이어야 합니다
- JSON만 출력하세요. 다른 텍스트 절대 금지

출력 형식 (반드시 이 JSON만):
{"chunks":["단계1","단계2","단계3"],"reasoning":{"what":"입력 내용을 어떻게 읽었는지 1문장","how":"어떤 기준으로 나눴는지 1문장"}}`;

  const lines = [];
  lines.push(`할 일 제목: ${title}`);
  if(desc && desc.trim()) lines.push(`메모/설명:\n${desc.trim()}`);
  if(tpl) lines.push(`템플릿: ${tpl.name}\n권장 흐름: ${tpl.structureHint||''}`);
  if(file) lines.push(`첨부 파일: ${file.name}`);

  try {
    const raw = await callClaude(systemPrompt, lines.join('\n\n'));
    const clean = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    let chunks = (parsed.chunks || []).slice(0, 8);
    if(chunks.length < 3) chunks.push('마무리 점검');
    return {
      chunks: chunks.map(t => ({t, guide: null})),
      reasoning: {
        what: parsed.reasoning?.what || '입력 내용을 분석해 작업 흐름을 파악했어요.',
        how: parsed.reasoning?.how || '각 단계를 바로 실행 가능한 행동으로 나눴어요.',
        source: tpl ? 'template-ai' : 'ai'
      }
    };
  } catch(e) {
    console.warn('AI 쪼개기 실패, fallback:', e);
    return demoDecomposeFallback(title, desc, tpl);
  }
}

function demoDecomposeFallback(title, desc, tpl){
  const text = `${title||''} ${desc||''}`.toLowerCase();
  const d = (desc||'').trim();
  let chunks, source='fallback';

  if(tpl && Array.isArray(tpl.previewChunks) && tpl.previewChunks.length){
    chunks = tpl.previewChunks.slice(); source='template-fallback';
  } else if(/발표|ppt|슬라이드|시연/.test(text)){
    const isTeam = /팀|팀원|파트/.test(d);
    chunks = [
      '핵심 메시지 한 줄 정리',
      '슬라이드 흐름 초안 잡기',
      isTeam ? '팀원 파트 분배' : '슬라이드 내용 채우기',
      '시연 흐름 맞추기',
      '리허설 후 수정'
    ];
  } else if(/공부|시험|중간고사|기말고사/.test(text)){
    const rangeMatch = d.match(/(\d+[~\-]\d+장|[가-힣]+ 단원)/);
    const range = rangeMatch ? rangeMatch[0] : null;
    chunks = [
      range ? `${range} 범위 확인` : '시험 범위 확인',
      '핵심 개념 정리',
      '기출·예제 풀기',
      '오답 노트 정리',
      '최종 점검'
    ];
  } else if(/레포트|리포트|보고서|논문|사례분석/.test(text)){
    const pageMatch = d.match(/[Aa]4\s*(\d+)[페p]/) || d.match(/(\d+)\s*페이지/);
    const pages = pageMatch ? `A4 ${pageMatch[1]}p` : null;
    const topicMatch = d.match(/([가-힣]{2,12}(?:이론|분석|사례|개념|효과|현상|기제))/);
    const topic = topicMatch ? topicMatch[0] : null;
    chunks = [
      pages ? `분량(${pages})·제출 형식 확인` : '분량·제출 형식 확인',
      topic ? `${topic} 사례 선정` : '주제·사례 선정',
      '목차와 구조 잡기',
      topic ? `${topic} 본문 초안 작성` : '본문 초안 작성',
      '퇴고 후 제출본 저장'
    ];
  } else if(/자소서|자기소개서|지원/.test(text)){
    const companyMatch = d.match(/([가-힣a-zA-Z]+)\s*(?:인턴|공채|신입|지원)/);
    const company = companyMatch ? companyMatch[1] : null;
    chunks = [
      company ? `${company} 공고 요구사항 분석` : '공고 요구사항 분석',
      '경험 키워드 뽑기',
      '항목별 초안 작성',
      '분량·맞춤법 점검',
      '최종 저장 및 제출'
    ];
  } else if(/포트폴리오|포폴/.test(text)){
    chunks = ['구성할 프로젝트 선정','각 프로젝트 설명 작성','디자인·구조 잡기','배포 및 링크 확인'];
  } else {
    chunks = ['할 일 범위 확인','핵심부터 시작','중간 결과 점검','마무리 및 제출'];
  }

  if(chunks.length > 8) chunks = chunks.slice(0,8);
  if(chunks.length < 3) chunks.push('마무리 점검');
  return {
    chunks: chunks.map(t => ({t, guide: null})),
    reasoning: {
      what: tpl ? `"${tpl.name}" 템플릿 흐름을 바탕으로 정리했어요.` : '제목과 메모에서 핵심 내용을 파악해 단계를 나눴어요.',
      how: '입력한 조건(분량·주제·마감)을 최대한 반영해 실행 가능한 순서로 정리했어요.',
      source
    }
  };
}


/* ═══════════════ HELPERS ═══════════════ */
function findChunk(id){
  for(const p of S.projects){
    for(const c of (p.chunks||[])){
      if(c.id===id) return c;
      if(c.subChunks&&c.subChunks.length){
        const sc=c.subChunks.find(x=>x.id===id);
        if(sc) return sc;
      }
    }
  }
  return null;
}

function findProj(id){
  return S.projects.find(p=>p.id===id);
}

function updatePill(){
  const txt=document.getElementById('done-pill-text');
  if(txt) txt.textContent=`오늘 ${S.totalMins}분`;
}

function updateClock(){
  const now=new Date();
  const el=document.getElementById('sb-time');
  if(el) el.textContent=`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
}

setInterval(updateClock,15000);
updateClock();

rHome();
</script>
