<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>한발짝 v2 · 작은 시작이 큰 변화가 돼요</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#FFF8F1;
  --sf:#FFFFFF;
  --sf2:#FFFBF5;
  --ac:#FF9478;
  --ac-d:#FF7A58;
  --ac-s:#FFF0E8;
  --ac-s2:#FFE1D4;
  --ac-grad:linear-gradient(135deg,#FFB59C 0%,#FF8567 100%);
  --tx:#3D2F27;
  --tx2:#6B5A4E;
  --mu:#B5A495;
  --mu2:#D9CCBE;
  --fa:#FFF3EA;
  --bd:#F5E6D8;
  --bd2:#FAEFE3;
  --gn:#7BC496;
  --gn-s:#ECF7F0;
  --yl:#FFD88A;
  --pk:#FFB5C5;
  --rd:#FF6B6B;
  --r:20px;
  --r2:16px;
  --shadow-sm:0 2px 6px rgba(180,110,70,.06);
  --shadow-md:0 6px 20px rgba(180,110,70,.09);
  --shadow-lg:0 14px 36px rgba(180,110,70,.12);
  --font-body:'Noto Sans KR',-apple-system,sans-serif;
  --font-title:'Gaegu','Noto Sans KR',sans-serif;
  --font-display:'Noto Sans KR',-apple-system,sans-serif;
}

html,body{height:100%}
body{
  font-family:var(--font-body);
  background:var(--bg);
  display:flex;flex-direction:column;
  margin:0;min-height:100vh;min-height:100dvh;
  color:var(--tx);
}

/* 실제 앱 컨테이너 — 화면을 꽉 채움, 장식 없음 */
#phone{
  width:100%;
  flex:1;
  background:var(--bg);
  display:flex;flex-direction:column;
  position:relative;
}

/* Header */
.header{
  background:var(--sf);padding:14px 22px 16px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;position:relative;
}
.header::after{
  content:'';position:absolute;left:22px;right:22px;bottom:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--bd) 30%,var(--bd) 70%,transparent);
}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-badge{
  width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  position:relative;
  transform:rotate(-8deg);
  transition:transform .3s cubic-bezier(.5,1.5,.5,1);
}
.logo-badge:hover{transform:rotate(5deg) scale(1.1)}
.logo-text{
  font-family:var(--font-title);
  font-size:24px;font-weight:700;letter-spacing:-.3px;color:var(--tx);
}
.logo-text em{color:var(--ac-d);font-style:normal}
.done-pill{
  display:flex;align-items:center;gap:6px;
  background:var(--ac-s);color:var(--ac-d);
  font-size:12px;font-weight:700;
  padding:8px 14px;border-radius:24px;
  transition:all .3s;
  border:1px solid var(--ac-s2);
}
.done-pill-dot{
  width:6px;height:6px;border-radius:50%;background:var(--ac);
  box-shadow:0 0 0 3px rgba(255,107,61,.18);
  animation:pulse 2.4s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Content */
.body{flex:1;overflow-y:auto;position:relative;background:var(--bg)}
.body::-webkit-scrollbar{width:0}
.screen{display:none;flex-direction:column;min-height:100%}
.screen.on{display:flex}
.fade{animation:fd .28s cubic-bezier(.2,.8,.2,1)}
@keyframes fd{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Bottom Nav */
.nav{
  background:var(--sf);
  display:grid;grid-template-columns:repeat(5,1fr);
  padding:10px 8px 28px;flex-shrink:0;
  position:relative;
}
.nav::before{
  content:'';position:absolute;left:22px;right:22px;top:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--bd) 30%,var(--bd) 70%,transparent);
}
.nb{
  border:none;background:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:6px 0;font-family:var(--font-body);
  font-size:10px;font-weight:600;color:var(--mu);
  transition:all .2s;letter-spacing:.1px;
  border-radius:12px;
}
.nb.on{color:var(--ac)}
.nb.on svg{transform:scale(1.05)}
.nb svg{width:24px;height:24px;transition:transform .2s}

/* Type */
.ptitle{font-family:var(--font-body);font-size:24px;font-weight:700;color:var(--tx);letter-spacing:-.3px;line-height:1.3}
.psub{font-size:13px;color:var(--mu);margin-top:6px;font-weight:400}
.slabel{font-size:11px;font-weight:700;color:var(--mu);letter-spacing:.5px}

/* Card */
.card{background:var(--sf);border-radius:var(--r);box-shadow:var(--shadow-sm);border:1px solid var(--bd2)}

.all-group{display:block;width:100%}
.all-list-wrap{width:100%;max-width:1280px;margin:0 auto}
.all-group-grid{display:block;width:100%}
.detail-actions{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);gap:10px;align-items:center;width:100%}

/* Input */
textarea.inp,input.inp{
  width:100%;border:none;outline:none;background:none;resize:none;
  font-family:var(--font-body);font-size:15px;
  color:var(--tx);line-height:1.6;font-weight:500;
}
textarea.inp{min-height:78px}
textarea.inp::placeholder,input.inp::placeholder{color:var(--mu2);font-weight:400}
input.inp[type=date]{height:38px;font-size:14px;color:var(--tx2)}

/* Toggle */
.tog{
  width:46px;height:28px;border-radius:14px;
  background:var(--bd);position:relative;cursor:pointer;
  transition:background .2s;border:none;flex-shrink:0;
}
.tog.on{background:var(--ac)}
.tog::after{
  content:'';position:absolute;
  width:22px;height:22px;border-radius:50%;
  background:#fff;top:3px;left:3px;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  box-shadow:0 2px 5px rgba(0,0,0,.18);
}
.tog.on::after{transform:translateX(18px)}

/* Buttons */
.btn{
  width:100%;border:none;border-radius:14px;
  padding:17px;font-family:var(--font-body);
  font-size:15px;font-weight:700;cursor:pointer;
  transition:all .15s;letter-spacing:-.2px;
}
.btn:active{transform:scale(.97);opacity:.9}
.btn-p{
  background:var(--ac-grad);color:#fff;
  box-shadow:0 8px 20px rgba(255,133,103,.35),
             inset 0 -3px 0 rgba(0,0,0,.08),
             inset 0 2px 0 rgba(255,255,255,.25);
}
.btn-p:hover{box-shadow:0 10px 24px rgba(255,133,103,.42),inset 0 -3px 0 rgba(0,0,0,.08),inset 0 2px 0 rgba(255,255,255,.25)}
.btn-d{background:var(--tx);color:#fff}
.btn-ghost{
  background:none;border:none;font-family:var(--font-body);
  font-size:13px;font-weight:600;color:var(--mu);
  cursor:pointer;padding:10px;transition:color .15s;
}
.btn-ghost:hover{color:var(--tx)}
.btn-ol{
  background:var(--sf);border:1px solid var(--bd);
  border-radius:12px;padding:11px 18px;
  font-family:var(--font-body);font-size:13px;
  font-weight:700;color:var(--tx2);cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.btn-ol:hover{background:var(--fa);border-color:var(--mu2)}

/* Task row */
.tr{
  display:flex;align-items:center;gap:13px;
  padding:14px 18px;border-bottom:1px solid var(--bd2);
  cursor:pointer;transition:background .15s;
}
.tr:last-child{border-bottom:none}
.tr:hover{background:var(--fa)}
.tr-name{font-size:14px;font-weight:600;color:var(--tx);min-width:0;word-break:keep-all;overflow-wrap:anywhere}
.tr-meta{font-size:11px;color:var(--mu);margin-top:3px;font-weight:500}

/* Progress bar */
.pbar{height:6px;background:var(--fa);border-radius:6px;overflow:hidden}
.pbar-fill{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.2,.8,.2,1)}

/* Timer */
.t-ring{position:relative;width:240px;height:240px;flex-shrink:0}
.t-ring svg{transform:rotate(-90deg);display:block}
.t-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.t-num{font-family:var(--font-body);font-size:60px;font-weight:800;color:var(--tx);letter-spacing:-2px;line-height:1;font-variant-numeric:tabular-nums}
.t-st{font-size:11px;font-weight:700;color:var(--ac);letter-spacing:1px;text-transform:uppercase}

/* Done */
.done-big{font-family:var(--font-body);font-size:72px;font-weight:800;color:var(--ac-d);letter-spacing:-2px;line-height:1;font-variant-numeric:tabular-nums}

/* Action */
.ac-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--ac-s);color:var(--ac-d);
  font-size:11px;font-weight:800;padding:5px 11px;border-radius:8px;
  margin-bottom:16px;letter-spacing:.3px;
}
.ac-text{font-family:var(--font-body);font-size:22px;font-weight:700;color:var(--tx);line-height:1.35;letter-spacing:-.3px}
.sdot{height:5px;border-radius:3px;flex:1;transition:background .4s}

/* Chunks */
.ck-item{display:flex;align-items:flex-start;gap:14px;padding:13px 0;border-bottom:1px solid var(--bd2)}
.ck-item:last-child{border-bottom:none}
.ck-num{
  width:26px;height:26px;border-radius:50%;
  background:var(--fa);color:var(--mu);
  font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;border:1px solid var(--bd2);
}
.ck-num.first{background:var(--ac-grad);color:#fff;border:none;box-shadow:0 4px 10px rgba(255,87,34,.3)}
.ck-txt{font-size:14px;font-weight:600;color:var(--tx);line-height:1.4}
.ck-txt.first{color:var(--ac-d);font-weight:800}

/* Loading */
.dl-wrap{display:flex;gap:8px;justify-content:center}
.dl{width:9px;height:9px;border-radius:50%;background:var(--ac);animation:dlb 1.3s infinite}
.dl:nth-child(2){animation-delay:.2s}
.dl:nth-child(3){animation-delay:.4s}
@keyframes dlb{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}

/* Hero */
.hero{
  background:var(--ac-grad);
  border-radius:24px;padding:22px;color:#fff;
  position:relative;overflow:hidden;
  box-shadow:0 14px 30px rgba(255,133,103,.32),
             inset 0 -3px 0 rgba(0,0,0,.06),
             inset 0 2px 0 rgba(255,255,255,.25);
  cursor:pointer;transition:transform .15s;
}
.hero:active{transform:scale(.98)}
.hero::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:160px;height:160px;border-radius:50%;
  background:rgba(255,255,255,.08);
}

/* Check */
.chk{width:24px;height:24px;border-radius:50%;border:1.8px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;background:var(--sf)}
.chk.done{background:var(--gn);border-color:var(--gn);box-shadow:0 3px 8px rgba(34,165,96,.3)}

/* Account stat */
.snum{font-family:var(--font-body);font-size:32px;font-weight:800;color:var(--ac-d);letter-spacing:-.3px}
.slbl2{font-size:11px;color:var(--mu);margin-top:3px;font-weight:600}

/* Greeting */

/* Empty state */
.empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;text-align:center;
}
.empty-emoji{font-size:44px;margin-bottom:16px;opacity:.85}
.empty-title{font-family:var(--font-body);font-size:18px;font-weight:700;color:var(--tx);margin-bottom:8px}
.empty-sub{font-size:13px;color:var(--mu);font-weight:500;line-height:1.5;max-width:240px}

/* Quote chip */
.quote-chip{
  background:var(--sf);border:1px solid var(--bd2);
  border-radius:14px;padding:14px 16px;
  font-size:13px;color:var(--tx2);font-weight:500;
  line-height:1.5;font-style:italic;
  display:flex;gap:10px;align-items:flex-start;
}
.quote-chip::before{
  content:'"';font-size:30px;font-weight:900;color:var(--ac);
  line-height:1;flex-shrink:0;font-style:normal;
}

/* D-day badge */
.dday{
  display:inline-flex;align-items:center;
  font-size:12px;font-weight:800;
  padding:4px 10px;border-radius:8px;
  letter-spacing:-.2px;
}
.dday-warn{background:#FFF0E0;color:#E67E22;border:1.5px solid #F5C87A}
.dday-danger{background:#FFE0E0;color:#E74C3C;border:1.5px solid #F5A0A0}
.dday-safe{background:var(--gn-s);color:var(--gn);border:1.5px solid #B8E4C8}
.dday-none{background:var(--fa);color:var(--mu);border:1.5px solid var(--bd)}

/* Drag handle */
.drag-handle{cursor:grab;color:var(--mu2);touch-action:none;padding:4px}
.drag-handle:active{cursor:grabbing}

/* Edit chunk row */
.eck{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-bottom:1px solid var(--bd2);
  background:var(--sf);transition:background .15s;
}
.eck:last-child{border-bottom:none}
.eck:hover{background:var(--fa)}
.eck input{
  flex:1;border:none;outline:none;background:none;
  font-family:var(--font-body);font-size:14px;font-weight:600;color:var(--tx);
}
.eck-del{
  border:none;background:none;color:var(--mu);
  cursor:pointer;padding:4px;transition:color .15s;font-size:16px;
}
.eck-del:hover{color:var(--rd)}

/* Timer controls */
.timer-controls{display:flex;gap:10px;width:100%;max-width:280px}
.timer-btn{
  flex:1;padding:14px;border-radius:14px;
  font-family:var(--font-body);font-size:14px;font-weight:700;
  cursor:pointer;transition:all .15s;border:none;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.timer-btn:active{transform:scale(.96)}
.timer-btn-pause{background:var(--ac-s);border:1.5px solid var(--ac) !important;color:var(--ac-d)}
.timer-btn-stop{background:var(--sf);color:var(--mu);border:1.5px solid var(--bd) !important}
.timer-btn-stop:hover{color:var(--tx2)}

/* Time input spinner */
.tis{display:flex;align-items:center;gap:4px;justify-content:center}
.tis-block{display:flex;flex-direction:column;align-items:center;gap:2px}
.tis-val{
  font-family:var(--font-body);font-size:48px;font-weight:800;
  color:var(--tx);letter-spacing:-1px;line-height:1;
  width:72px;text-align:center;
  font-variant-numeric:tabular-nums;
}
.tis-label{font-size:10px;color:var(--mu);font-weight:600;letter-spacing:.5px}
.tis-sep{font-family:var(--font-body);font-size:36px;font-weight:800;color:var(--mu2);margin:0 2px;padding-bottom:16px}
.tis-btn{
  width:36px;height:36px;border-radius:50%;border:1.5px solid var(--bd);
  background:var(--sf);color:var(--tx2);font-size:18px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .1s;font-family:var(--font-body);
}
.tis-btn:hover{background:var(--fa);border-color:var(--mu2)}
.tis-btn:active{transform:scale(.9)}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-head{font-size:11px;font-weight:700;color:var(--mu);padding:8px 0}
.cal-day{
  padding:8px 0;border-radius:10px;font-size:13px;font-weight:600;
  color:var(--tx);cursor:pointer;transition:all .12s;position:relative;
}
.cal-day:hover{background:var(--fa)}
.cal-day.today{background:var(--ac-s);color:var(--ac-d);font-weight:800}
.cal-day.selected{background:var(--ac-grad);color:#fff}
.cal-day.other{color:var(--mu2)}
.cal-day .cal-dot{
  width:4px;height:4px;border-radius:50%;background:var(--ac);
  position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
}
/* 오늘 탭 — 주간 날짜 strip */
.dow-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.dow-cell{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:6px 0 8px;cursor:pointer;border-radius:12px;transition:background .12s;
}
.dow-cell:hover{background:var(--fa)}
.dow-name{font-size:11px;font-weight:700;color:var(--mu);letter-spacing:.3px}
.dow-circle{
  width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:var(--tx);background:transparent;border:1.5px solid var(--bd2);
  position:relative;transition:all .15s;
}
.dow-cell.today .dow-name{color:var(--ac-d)}
.dow-cell.today .dow-circle{background:var(--ac);color:#fff;border-color:var(--ac);box-shadow:0 4px 10px rgba(255,107,61,.28)}
.dow-cell.selected .dow-circle{background:var(--tx);color:#fff;border-color:var(--tx)}
.dow-cell.today.selected .dow-circle{background:var(--ac-grad);border-color:transparent}
.dow-circle .cal-dot{
  position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--ac);
}

/* 오늘 탭 — 월간 셀 (칩) */
.mo-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mo-cell{
  min-height:70px;padding:4px 3px;border-radius:8px;cursor:pointer;transition:background .12s;
  display:flex;flex-direction:column;gap:2px;
}
.mo-cell:hover{background:var(--fa)}
.mo-cell.other{opacity:.35}
.mo-num-wrap{display:flex;justify-content:center}
.mo-num{font-size:11px;font-weight:700;color:var(--tx);padding:2px 6px;border-radius:999px;min-width:20px;text-align:center}
.mo-cell.today .mo-num{background:var(--ac);color:#fff}
.mo-cell.selected .mo-num{background:var(--tx);color:#fff}
.mo-cell.today.selected .mo-num{background:var(--ac-grad);color:#fff}
.mo-chip{
  font-size:9.5px;font-weight:700;color:var(--tx);background:var(--ac-s);
  padding:2px 4px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;
}
.mo-more{font-size:9px;font-weight:700;color:var(--mu);text-align:center;padding:1px 0}

/* 오늘 탭 — 뷰 토글 */
.cal-vtog{display:inline-flex;background:var(--fa);border-radius:10px;padding:3px;gap:3px}
.cal-vtog button{
  border:none;background:transparent;padding:6px 12px;border-radius:8px;
  font-family:var(--font-body);font-size:12px;font-weight:700;color:var(--mu);cursor:pointer;transition:all .12s;
}
.cal-vtog button.on{background:var(--sf);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* 오늘 탭 — TODO 리스트 행 */
.todo-row{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  background:var(--sf);border:1px solid var(--bd2);border-radius:12px;margin-bottom:8px;
  cursor:pointer;transition:all .12s;
}
.todo-row:hover{background:var(--fa);border-color:var(--bd)}
.todo-num{
  width:22px;height:22px;border-radius:6px;background:var(--fa);color:var(--mu);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;
}
.todo-icon{
  width:26px;height:26px;border-radius:7px;background:var(--ac-s);color:var(--ac-d);
  display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0;letter-spacing:.2px;
}
.todo-body{flex:1;min-width:0}
.todo-title{font-size:13.5px;font-weight:700;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.todo-sub{font-size:11.5px;color:var(--mu);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* 투두 탭 — 플로팅 추가 버튼 */
#fab-layer{position:absolute;right:0;left:0;bottom:96px;pointer-events:none;z-index:15;display:flex;justify-content:flex-end;padding-right:22px}
#fab-layer .fab-add{pointer-events:auto}
.fab-add{
  width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;
  background:var(--ac-grad);color:#fff;font-size:28px;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 24px rgba(255,107,61,.45);transition:transform .12s;
}
.fab-add:active{transform:scale(.94)}
/* 투두 탭 — 월간 프로젝트 박스 & 카운트 박스 */
.mo-projbox{
  font-size:9.5px;font-weight:800;color:#fff;padding:2px 5px;border-radius:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;
}
.mo-countbox{
  font-size:9px;font-weight:800;color:var(--mu);background:var(--fa);
  padding:2px 5px;border-radius:4px;text-align:center;line-height:1.3;
}
/* 투두 탭 — 오늘로 이동 버튼 */
.cal-today-btn{
  border:1.5px solid var(--bd);background:var(--sf);color:var(--tx);
  width:32px;height:32px;border-radius:9px;font-family:var(--font-body);font-size:13px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:0;
}
.cal-today-btn:hover{background:var(--fa)}
.cal-today-btn.on{background:var(--ac-s);color:var(--ac-d);border-color:var(--ac-s)}
/* 투두 탭 — 주간 리스트 정렬 핸들 */
.todo-reorder{display:flex;flex-direction:column;gap:2px;flex-shrink:0;margin-right:4px}
.todo-reorder button{
  width:22px;height:18px;border:none;background:var(--fa);color:var(--mu);cursor:pointer;border-radius:5px;
  display:flex;align-items:center;justify-content:center;font-size:10px;padding:0;
}
.todo-reorder button:hover:not(:disabled){background:var(--bd2);color:var(--tx)}
.todo-reorder button:disabled{opacity:.3;cursor:not-allowed}

/* File area */
.file-area{
  border:1.5px dashed var(--bd);border-radius:12px;
  padding:14px 16px;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:10px;
}
.file-area:hover{border-color:var(--ac);background:var(--ac-s)}
.file-chip{
  display:flex;align-items:center;gap:8px;
  background:var(--ac-s);border-radius:10px;padding:8px 12px;
  font-size:13px;font-weight:600;color:var(--ac-d);
}

/* Arrow icon for navigation */
.arr{color:var(--mu2);flex-shrink:0;transition:color .15s}
.tr:hover .arr{color:var(--ac)}

/* ── v2: Reasoning card ── */
.reason-card{
  background:var(--sf2);border:1px solid var(--bd2);
  border-radius:14px;overflow:hidden;
  transition:all .2s;
}
.reason-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;cursor:pointer;user-select:none;
}
.reason-head:hover{background:var(--fa)}
.reason-title{font-size:13px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:7px}
.reason-toggle{color:var(--mu);font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px}
.reason-body{
  padding:0 16px 14px;font-size:12.5px;color:var(--tx2);
  line-height:1.6;font-weight:500;
  display:none;border-top:1px solid var(--bd2);
  padding-top:12px;margin-top:-1px;
}
.reason-card.open .reason-body{display:block;animation:fd .25s cubic-bezier(.2,.8,.2,1)}
.reason-card.open .reason-toggle svg{transform:rotate(180deg)}
.reason-toggle svg{transition:transform .2s}
.reason-item{display:flex;gap:8px;padding:5px 0}
.reason-item-icon{
  flex-shrink:0;width:20px;height:20px;border-radius:50%;
  background:var(--ac-s);color:var(--ac-d);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;margin-top:1px;
}
.reason-item-text{flex:1}
.reason-item-label{font-size:10.5px;font-weight:700;color:var(--ac-d);letter-spacing:.3px;margin-bottom:2px}

/* ── v2: Direction chips ── */
.chip-row-label{font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:8px;padding-left:2px;display:flex;align-items:center;gap:5px}
.chip-row{display:flex;flex-wrap:wrap;gap:7px}
.chip{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--sf);border:1.5px solid var(--bd);
  border-radius:18px;padding:8px 14px;
  font-family:var(--font-body);font-size:12px;font-weight:700;
  color:var(--tx2);cursor:pointer;transition:all .15s;
  white-space:nowrap;
}
.chip:hover{background:var(--ac-s);border-color:var(--ac);color:var(--ac-d)}
.chip:active{transform:scale(.96)}
.chip-feedback{background:var(--ac-s);border-color:var(--ac-s2);color:var(--ac-d)}
.chip-feedback:hover{background:var(--ac-s2)}



/* ── v2: Feedback screen ── */
.fb-input{
  width:100%;border:1.5px solid var(--bd);outline:none;
  background:var(--sf);border-radius:14px;
  padding:14px;font-family:var(--font-body);
  font-size:14px;color:var(--tx);line-height:1.5;
  resize:none;min-height:120px;transition:border .15s;
}
.fb-input:focus{border-color:var(--ac)}
.fb-input::placeholder{color:var(--mu2);font-weight:400}

/* ── v2: History notice ── */
.hist-notice{
  background:var(--sf2);border:1px dashed var(--bd);
  border-radius:12px;padding:10px 14px;
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--tx2);font-weight:500;
}
.hist-link{
  color:var(--ac-d);font-weight:700;cursor:pointer;
  text-decoration:underline;text-underline-offset:2px;
}

/* ── v2: Inline meta-info on chunks screen ── */
.meta-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.meta-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--fa);border:1px solid var(--bd2);
  border-radius:7px;padding:3px 9px;
  font-size:11px;font-weight:700;color:var(--tx2);
}
.meta-badge-ac{background:var(--ac-s);border-color:var(--ac-s2);color:var(--ac-d)}

/* ── 템플릿 선택 기능 ── */
.tab-seg{
  display:flex;background:var(--fa);border-radius:12px;padding:4px;gap:4px;
  margin-bottom:14px;
}
.tab-btn{
  flex:1;padding:9px 0;border-radius:9px;border:none;background:transparent;
  font-family:var(--font-body);font-size:13px;font-weight:700;color:var(--mu);cursor:pointer;
  transition:background .15s,color .15s,box-shadow .15s;
}
.tab-btn.on{background:var(--sf);color:var(--ac-d);box-shadow:0 1px 3px rgba(0,0,0,.06)}

.tpl-filter-row{
  display:flex;gap:7px;overflow-x:auto;padding:2px 2px 6px;margin-bottom:10px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.tpl-filter-row::-webkit-scrollbar{display:none}
.tpl-filter-chip{
  flex:0 0 auto;padding:6px 11px;border-radius:999px;background:var(--sf);
  border:1px solid var(--bd);font-size:12px;font-weight:700;color:var(--tx2);
  cursor:pointer;transition:background .15s,color .15s,border-color .15s;white-space:nowrap;
}
.tpl-filter-chip.on{background:var(--ac);color:#fff;border-color:var(--ac)}

.tpl-section-label{
  font-size:11px;font-weight:800;letter-spacing:.3px;color:var(--mu);
  margin:6px 2px 8px;
}
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tpl-card{
  background:var(--sf);border:1px solid var(--bd);border-radius:14px;
  padding:12px 12px 10px;cursor:pointer;transition:transform .1s,border-color .15s,box-shadow .15s;
  display:flex;flex-direction:column;gap:6px;text-align:left;
}
.tpl-card:hover{border-color:var(--ac);box-shadow:0 2px 8px rgba(255,148,120,.12)}
.tpl-card:active{transform:scale(.98)}
.tpl-card-ico{font-size:22px;line-height:1}
.tpl-card-name{font-size:13px;font-weight:800;color:var(--tx);line-height:1.3}
.tpl-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px}
.tpl-scale{
  display:inline-block;font-size:10px;font-weight:800;padding:1px 7px;border-radius:999px;
  letter-spacing:.3px;
}
.tpl-scale.s{background:#E8F5E9;color:#2E7D32}
.tpl-scale.m{background:#FFF3E0;color:#EF6C00}
.tpl-scale.l{background:#EDE7F6;color:#5E35B1}
.tpl-days{font-size:10.5px;color:var(--mu);font-weight:600}

/* 템플릿 선택된 뱃지 (입력 양식 상단) */
.tpl-badge{
  display:flex;align-items:center;gap:8px;background:var(--ac-s);
  border:1px solid var(--ac-s2);border-radius:10px;padding:8px 12px;margin-bottom:10px;
}
.tpl-badge-ico{font-size:16px;line-height:1}
.tpl-badge-text{flex:1;font-size:12px;font-weight:700;color:var(--ac-d);line-height:1.3}
.tpl-badge-close{
  border:none;background:none;color:var(--ac-d);cursor:pointer;font-size:14px;
  font-weight:800;padding:0 4px;
}

/* 템플릿 미리보기 바텀시트 */
.tpl-preview-bd{
  position:absolute;inset:0;background:rgba(30,20,10,.45);backdrop-filter:blur(2px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;transition:opacity .15s;pointer-events:none;z-index:110;
}
.tpl-preview-bd.on{opacity:1;pointer-events:auto}
.tpl-preview-card{
  background:var(--sf);border-radius:20px 20px 0 0;width:100%;max-width:480px;
  padding:20px 22px 22px;transform:translateY(20px);transition:transform .2s;
  max-height:80vh;overflow-y:auto;
}
.tpl-preview-bd.on .tpl-preview-card{transform:translateY(0)}
.tpl-preview-ico{font-size:38px;text-align:center;margin-bottom:4px;line-height:1}
.tpl-preview-name{font-size:18px;font-weight:800;color:var(--tx);text-align:center;margin-bottom:4px}
.tpl-preview-sum{font-size:12px;color:var(--tx2);text-align:center;margin-bottom:14px;line-height:1.5}
.tpl-preview-meta-row{
  display:flex;gap:10px;background:var(--fa);border-radius:10px;padding:10px 12px;margin-bottom:14px;
}
.tpl-preview-meta-col{flex:1;text-align:center}
.tpl-preview-meta-lbl{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.3px;margin-bottom:3px}
.tpl-preview-meta-val{font-size:13px;font-weight:800;color:var(--tx)}
.tpl-preview-chunks-lbl{font-size:12px;font-weight:800;color:var(--tx2);margin-bottom:8px}
.tpl-preview-chunks{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.tpl-preview-chunk{
  display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--sf2);
  border:1px solid var(--bd2);border-radius:9px;font-size:12px;color:var(--tx);
}
.tpl-preview-chunk-num{
  width:18px;height:18px;border-radius:50%;background:var(--ac-s);color:var(--ac-d);
  font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* 템플릿 바인딩 시 쪼개기 결과 카드에 노출할 플래그 */
.tpl-source-note{
  display:inline-flex;align-items:center;gap:4px;background:#F3E8FF;color:#6D28D9;
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;margin-left:6px;
}


.subtle-action-btn{
  background:transparent;border:none;color:var(--mu);
  font-family:var(--font-body);font-size:11.5px;font-weight:700;
  cursor:pointer;padding:4px 2px;white-space:nowrap;
  text-decoration:underline;text-underline-offset:3px;
  transition:color .15s, opacity .15s;
  opacity:.9;
}
.subtle-action-btn:hover{color:var(--tx2);opacity:1}
.prominent-split-btn{
  background:var(--ac-s);color:var(--ac-d);border:none;
  border-radius:10px;padding:7px 12px;
  font-family:var(--font-body);font-size:12px;font-weight:800;
  cursor:pointer;white-space:nowrap;transition:all .15s;
}
.prominent-split-btn:hover{background:var(--ac-s2);transform:translateY(-1px)}
.all-shell{width:100%;max-width:1480px;margin:0 auto}
.all-topbar{
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap
}
.all-metrics{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.all-metric{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--fa);border:1px solid var(--bd2);border-radius:999px;
  padding:7px 12px;min-width:auto;box-shadow:none
}
.all-metric-num{font-size:13px;font-weight:800;color:var(--tx);line-height:1}
.all-metric-label{font-size:12px;color:var(--mu);font-weight:700;margin-top:0}
.all-filter-row{display:flex;gap:8px;flex-wrap:wrap}
.all-filter-chip{
  border:1px solid var(--bd);background:var(--sf);color:var(--tx2);
  border-radius:999px;padding:8px 12px;font-size:12px;font-weight:700;
}
.edit-context-card{
  background:var(--sf2);border:1px solid var(--bd2);border-radius:16px;padding:14px 16px
}
.edit-context-label{font-size:11px;font-weight:800;color:var(--ac-d);letter-spacing:.3px;margin-bottom:6px}
.edit-context-project{font-size:12px;color:var(--mu);font-weight:700;margin-bottom:4px}
.edit-context-task{font-size:19px;font-weight:800;color:var(--tx);line-height:1.35;letter-spacing:-.2px}
.edit-context-sub{font-size:12px;color:var(--tx2);margin-top:6px;line-height:1.5}

/* v2: Modal */
#modal-root{position:absolute;inset:0;z-index:100;pointer-events:none}
#modal-root.on{pointer-events:auto}
.modal-backdrop{position:absolute;inset:0;background:rgba(30,20,10,.45);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;transition:opacity .15s}
#modal-root.on .modal-backdrop{opacity:1}
.modal-card{background:var(--sf);border-radius:18px;padding:22px 22px 18px;width:100%;max-width:320px;box-shadow:0 20px 50px rgba(0,0,0,.2);transform:scale(.96);transition:transform .15s}
#modal-root.on .modal-card{transform:scale(1)}
.modal-title{font-size:16px;font-weight:800;color:var(--tx);margin-bottom:6px}
.modal-msg{font-size:13px;color:var(--tx2);line-height:1.5;margin-bottom:16px}
.modal-btns{display:flex;gap:8px}
.modal-btn{flex:1;padding:11px 0;border-radius:11px;border:1px solid var(--bd);background:var(--sf);color:var(--tx);font-family:var(--font-body);font-size:13px;font-weight:800;cursor:pointer}
.modal-btn-danger{background:var(--rd);border-color:var(--rd);color:#fff}

/* v2: Chunk check toggle */
.ck-check{cursor:pointer;transition:transform .1s}
.ck-check:hover{transform:scale(1.08)}
.ck-check:active{transform:scale(.94)}

/* 메인 영역 래퍼: 데스크탑 사이드바 레이아웃에서 헤더+바디를 컬럼으로 묶음 */
.main-wrap{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
  min-height:100vh;min-height:100dvh;
  position:relative;
}

/* ═══════════════════ Responsive ═══════════════════
   전략 (모바일 퍼스트):
   • 모바일(≤767px): 헤더 상단, 콘텐츠 중간 스크롤, 바텀 네비. (기본)
   • 태블릿(768–1023px): 같은 세로 배치 + 콘텐츠 폭 확장, 내부 여백 증가.
   • 데스크탑(≥1024px): 좌측 사이드바 네비로 전환, 콘텐츠 중앙 정렬(max-width).
   • 와이드(≥1440px): 프로젝트 리스트 등 다중 열 그리드로 확장.
*/

/* iOS 등 실제 기기 안전영역 */
.header{padding-top:max(14px, env(safe-area-inset-top))}
.nav{padding-bottom:max(20px, calc(env(safe-area-inset-bottom) + 12px))}

/* ── 초소형 모바일(≤360px) ── */
@media (max-width: 360px){
  .header{padding-left:16px;padding-right:16px}
  .header::after{left:16px;right:16px}
  .nav::before{left:16px;right:16px}
}
@media (max-width: 640px){
  .detail-actions{grid-template-columns:1fr auto 1fr;gap:8px}
  .detail-actions .btn-ol{padding-left:10px;padding-right:10px}
}


/* ── 낮은 높이: 타이머/큰 숫자 축소 ── */
@media (max-height: 560px){
  .t-ring{width:180px;height:180px}
  .t-ring svg{width:180px;height:180px}
  .t-num{font-size:44px}
  .done-big{font-size:56px}
}

/* ── 태블릿(≥768px): 여유있는 여백, 중앙 정렬 ── */
@media (min-width: 768px){
  .header{padding-left:28px;padding-right:28px}
  .header::after{left:28px;right:28px}
  /* 각 화면 콘텐츠는 최대 720px 중앙 정렬 */
  .screen > :first-child{
    max-width:720px;
    margin:0 auto;
    width:100%;
  }
  .modal-card{max-width:420px}
  /* 프로젝트 리스트: 태블릿에서는 여전히 1열(너무 좁음) */
}

/* ── 데스크탑(≥1024px): 사이드바 네비 + 중앙 콘텐츠 ── */
@media (min-width: 1024px){
  #phone{flex-direction:row}
  .main-wrap{
    flex:1;
    min-width:0;
    /* 모바일에서 준 min-height 초기화하여 flex가 바르게 동작하도록 */
    min-height:100vh;
    height:100vh;
    overflow:hidden;
  }

  /* 사이드바 네비 — 좌측 고정폭 */
  .nav{
    order:-1;
    width:248px;
    flex-shrink:0;
    height:100vh;
    background:var(--sf);
    border-right:1px solid var(--bd);
    border-top:none;
    grid-template-columns:none;
    display:flex;
    flex-direction:column;
    gap:4px;
    padding:28px 14px;
    padding-bottom:28px;
  }
  .nav::before{display:none}
  .nb{
    flex-direction:row;
    justify-content:flex-start;
    align-items:center;
    gap:14px;
    padding:13px 16px;
    font-size:14px;
    font-weight:700;
    border-radius:12px;
    width:100%;
    letter-spacing:-.1px;
  }
  .nb svg{width:22px;height:22px;margin:0}
  .nb:hover{background:var(--fa)}
  .nb.on{background:var(--ac-s);color:var(--ac-d)}
  .nb.on svg{transform:none}

  /* 헤더: 메인 영역 기준 중앙 정렬 */
  .header{
    padding:18px 40px 20px;
    flex-shrink:0;
  }
  .header::after{left:40px;right:40px}
  /* 바디: flex 스크롤 컨테이너 */
  .body{flex:1;min-height:0}

  /* 화면 콘텐츠: 최대 960px 중앙 정렬
     (내부 padding은 템플릿의 inline style이 유지됨 → 추가 덧댐 불필요) */
  .screen > :first-child{
    max-width:960px;
    margin:0 auto;
    width:100%;
  }

  /* 프로젝트 리스트(전체 탭): 카드 2열 그리드
     ── ':has(.dday)'로 스코프를 '프로젝트 목록 그룹(D-day 헤더가 있는 블록)'
        에만 한정하여, 상세 화면 마일스톤 래퍼가 섞여 들어가지 않도록 한다.
     ── align-items:start 로 단일 할 일(작은) 카드가 AI로 쪼갠 큰 카드의
        높이에 맞춰 세로로 늘어나는 현상을 방지한다. */
  .all-list-wrap{max-width:1480px;margin:0 auto;width:100%;}
  .all-group-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:12px;
    align-items:start;
    width:100%;
  }
  .all-group-grid > .card{
    margin-bottom:0 !important;
    align-self:start;
  }
  .detail-actions{
    max-width:640px;
    margin-left:auto;
    margin-right:auto;
  }

  /* FAB: 메인 영역 내부 우측 하단에 고정 느낌 */
  #fab-layer{
    left:248px; /* 사이드바 폭만큼 밀기 */
    bottom:32px;
    padding-right:40px;
  }

  /* 모달은 main-wrap 기준으로 중앙 */
  #modal-root{left:248px}
  .modal-card{max-width:460px}
}

function getTemplateById(id){return TEMPLATES.find(t=>t.id===id)||null;}
function getTemplatesByCategory(catId){
  if(!catId||catId==='all') return TEMPLATES;
  if(catId==='featured') return TEMPLATES.filter(t=>t.featured);
  return TEMPLATES.filter(t=>t.category===catId);
}

function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dDay(due){
  if(!due) return null;
  const d=new Date(due),now=new Date();
  now.setHours(0,0,0,0);d.setHours(0,0,0,0);
  return Math.ceil((d-now)/(1000*60*60*24));
}

function dDayBadge(due){
  const dd=dDay(due);
  if(dd===null) return '<span class="dday dday-none">마감 X</span>';
  if(dd<0) return `<span class="dday dday-danger">D+${Math.abs(dd)}</span>`;
  if(dd===0) return '<span class="dday dday-danger">D-Day</span>';
  if(dd<=3) return `<span class="dday dday-warn">D-${dd}</span>`;
  return `<span class="dday dday-safe">D-${dd}</span>`;
}
function dDayInline(due,size){
  const dd=dDay(due);
  if(dd===null) return '';
  const sz=size||'13.5px';
  let color='#22A560';
  let txt='';
  if(dd<0){color='#E74C3C';txt=`D+${Math.abs(dd)}`;}
  else if(dd===0){color='#E74C3C';txt='D-Day';}
  else if(dd<=3){color='#E67E22';txt=`D-${dd}`;}
  else{color='#22A560';txt=`D-${dd}`;}
  return `<span style="font-size:${sz};font-weight:800;color:${color};flex-shrink:0">${txt}</span>`;
}

function fmtDate(d){
  if(!d) return '없음';
  const dt=new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}

function fmtTime(mins){
  if(mins<60) return `${mins}분`;
  const h=Math.floor(mins/60),m=mins%60;
  return m?`${h}시간 ${m}분`:`${h}시간`;
}


function roundToFive(mins){
  if(!mins||mins<=0) return 0;
  return Math.max(5, Math.round(mins/5)*5);
}

function fmtExpectedTime(mins){
  const rounded=roundToFive(mins);
  return rounded>0?`예상 ${fmtTime(rounded)}`:'';
}

function guessChunkMinutes(chunk){
  if(!chunk) return 0;
  if(chunk.estimatedMinutes&&chunk.estimatedMinutes>0) return chunk.estimatedMinutes;
  if(chunk.subChunks&&chunk.subChunks.length){
    return chunk.estimatedMinutes=Math.min(60, Math.max(20, chunk.subChunks.length*10));
  }
  const t=(chunk.t||'');
  const len=t.replace(/\s+/g,'').length;
  if(/한 줄|표시|저장|선택|체크|분류|메모|설정|추가/.test(t) && len<=16) return chunk.estimatedMinutes=10;
  if(/확인|점검|검증|제출|최종/.test(t)) return chunk.estimatedMinutes=20;
  if(/리허설|발표|시연|테스트|QA|배포/.test(t)) return chunk.estimatedMinutes=30;
  if(/구현|개발|연동|화면|스타일|카드|섹션/.test(t)) return chunk.estimatedMinutes=len>12?60:45;
  if(/작성|초안|문구|목차|요약|자료|정리/.test(t)) return chunk.estimatedMinutes=len>12?40:30;
  if(/설계|구조|와이어|분석|조사|리서치|확정/.test(t)) return chunk.estimatedMinutes=len>12?40:30;
  if(len>=18) return chunk.estimatedMinutes=30;
  if(len>=10) return chunk.estimatedMinutes=20;
  return chunk.estimatedMinutes=15;
}

function chunkStatusText(chunk){
  if(!chunk) return '';
  if(chunk.done) return '완료';
  return fmtExpectedTime(guessChunkMinutes(chunk));
}

function getPriority(){
  // Sort by due date (nearest first), null due at end
  return [...S.projects].filter(p=>!p.chunks.every(c=>c.done)).sort((a,b)=>{
    if(!a.due&&!b.due) return 0;
    if(!a.due) return 1;
    if(!b.due) return -1;
    return new Date(a.due)-new Date(b.due);
  });
}

function getNextChunk(proj){
  return proj.chunks.find(c=>!c.done);
}

function projProgress(proj){
  const done=proj.chunks.filter(c=>c.done).length;
  return {done,total:proj.chunks.length,pct:proj.chunks.length?Math.round(done/proj.chunks.length*100):0};
}

/* ── Navigation history (v2) ── */
function snapshotNav(){
  return {
    view:S.view, homeMode:S.homeMode, allMode:S.allMode,
    detailProjId:S.detailProj?S.detailProj.id:null,
    curProjId:S.curProj?S.curProj.id:null,
    curChunkId:S.curChunk?S.curChunk.id:null,
    reasonOpen:S.reasonOpen
  };
}
function pushNav(){
  S.navHistory.push(snapshotNav());
  if(S.navHistory.length>30) S.navHistory.shift();
}
function goBack(){
  if(!S.navHistory.length){
    // fallback: 전체 목록
    S.detailProj=null;S.curProj=null;S.curChunk=null;
    S.detailSubMode=false;S._detailSubIdx=null;S._detailSubProjId=null;S._detailSubOriginalChunks=null;
    S.homeMode='input';S.allMode='list';
    go('all');return;
  }
  const s=S.navHistory.pop();
  S.homeMode=s.homeMode;S.allMode=s.allMode;
  S.detailProj=s.detailProjId?findProj(s.detailProjId):null;
  S.curProj=s.curProjId?findProj(s.curProjId):null;
  S.curChunk=null;
  if(s.curChunkId && S.curProj){
    S.curChunk=(S.curProj.chunks||[]).find(c=>c.id===s.curChunkId)||null;
  }
  S.reasonOpen=!!s.reasonOpen;
  // detailSubMode는 명시적 확정/취소로만 해제 — goBack 경로에서는 정리
  S.detailSubMode=false;S._detailSubIdx=null;S._detailSubProjId=null;S._detailSubOriginalChunks=null;
  go(s.view||'all',true);
}

/* ── Navigation ── */
function go(tab,keepMode){
  if(tab==='home'&&S.view!=='home'&&!keepMode) S.homeMode='input';
  if(tab==='all'&&S.view!=='all'&&!keepMode) S.allMode='list';
  S.view=tab;
  const fab=document.getElementById('fab-layer');
  if(fab&&tab!=='calendar') fab.innerHTML='';
  document.querySelectorAll('.nb[data-s]').forEach(b=>b.classList.toggle('on',b.dataset.s===tab));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  const el=document.getElementById('s-'+tab);
  el.classList.add('on');
  void el.offsetWidth;el.classList.add('fade');
  setTimeout(()=>el.classList.remove('fade'),320);
  render();
}

function render(){
  if(S.view==='home') rHome();
  if(S.view==='calendar') rCalendar();
  if(S.view==='all') rAll();
  if(S.view==='record') rRecord();
  if(S.view==='account') rAccount();
}

/* 탭 전환 */
function switchInputTab(tab){
  if(S.inputTab===tab) return;
  // 직접 입력 → 템플릿 탭 이동 시 현재 입력값을 lastInput에 보존
  if(tab==='template'&&S.inputTab==='direct'){
    const titleEl=document.getElementById('task-title');
    if(titleEl){
      const title=titleEl.value.trim();
      const desc=document.getElementById('task-desc')?.value.trim()||'';
      const startDate=document.getElementById('start-date')?.value||null;
      const due=document.getElementById('due-date')?.value||null;
      if(title||desc||startDate||due){
        // 템플릿이 활성 상태이거나 기존 lastInput이 템플릿 기반이면 플래그를 유지
        const keepFromTpl=!!(S.selectedTemplate||S.lastInput?.fromTemplate);
        S.lastInput={title,desc,startDate,due,wantSplit:S.formWantSplit,fileName:S.formFile?.name||null,fromTemplate:keepFromTpl};
      }
    }
  }
  S.inputTab=tab;
  rInput(document.getElementById('s-home'));
}

/* 템플릿 미리보기 바텀시트 열기 */
function openTemplatePreview(tplId){
  const tpl=getTemplateById(tplId);
  if(!tpl) return;
  S.tplPreviewId=tplId;
  const root=document.getElementById('tpl-preview-root');
  if(!root) return;
  const scaleClass=tpl.scaleHint==='large'?'l':tpl.scaleHint==='small'?'s':'m';
  const scaleLabel=tpl.scaleHint==='large'?'대'
                  :tpl.scaleHint==='small'?'소'
                  :'중';
  const days=tpl.prefill.suggestedDays?`${tpl.prefill.suggestedDays}일`:'마감 없음';
  const previewChunks=tpl.previewChunks||[];
  root.innerHTML=`
    <div class="tpl-preview-bd" onclick="closeTemplatePreview(event)">
      <div class="tpl-preview-card" onclick="event.stopPropagation()">
        <div class="tpl-preview-ico">${tpl.icon}</div>
        <div class="tpl-preview-name">${esc(tpl.name)}</div>
        <div class="tpl-preview-sum">${esc(tpl.summary)}</div>
        <div class="tpl-preview-meta-row">
          <div class="tpl-preview-meta-col">
            <div class="tpl-preview-meta-lbl">예상 기간</div>
            <div class="tpl-preview-meta-val">${days}</div>
          </div>
          <div class="tpl-preview-meta-col">
            <div class="tpl-preview-meta-lbl">예상 규모</div>
            <div class="tpl-preview-meta-val"><span class="tpl-scale ${scaleClass}" style="font-size:11px;padding:2px 8px">${scaleLabel}</span></div>
          </div>
        </div>
        <div class="tpl-preview-chunks-lbl">이렇게 쪼개져요 (예시)</div>
        <div class="tpl-preview-chunks">
          ${previewChunks.map((c,i)=>`
            <div class="tpl-preview-chunk">
              <div class="tpl-preview-chunk-num">${i+1}</div>
              <span>${esc(c)}</span>
            </div>`).join('')}
        </div>
        <button class="btn btn-p" style="width:100%" onclick="applyTemplate('${tpl.id}')">이 템플릿 참고하기</button>
        <button class="btn-ghost" style="width:100%;text-align:center;margin-top:8px" onclick="closeTemplatePreview()">닫기</button>
      </div>
    </div>`;
  // 다음 프레임에 .on 추가 → fade-in
  requestAnimationFrame(()=>{
    const bd=root.querySelector('.tpl-preview-bd');
    if(bd) bd.classList.add('on');
  });
}

function closeTemplatePreview(e){
  if(e&&e.target&&!e.target.classList.contains('tpl-preview-bd')) return;
  const root=document.getElementById('tpl-preview-root');
  const bd=root?.querySelector('.tpl-preview-bd');
  if(bd){
    bd.classList.remove('on');
    setTimeout(()=>{if(root) root.innerHTML='';},180);
  } else if(root){
    root.innerHTML='';
  }
  S.tplPreviewId=null;
}

/* 템플릿 적용 → 프리필 후 직접 입력 탭으로 복귀 */
function applyTemplate(tplId){
  const tpl=getTemplateById(tplId);
  if(!tpl) return;
  S.selectedTemplate=tplId;
  S.inputTab='direct';

  // 프리필: 기간 계산 (suggestedDays → 오늘부터 N일 뒤)
  const prefill=tpl.prefill||{};
  let startDate=null,due=null;
  if(!prefill.noDueDate&&prefill.suggestedDays){
    const today=new Date();
    startDate=todayStr();
    const end=new Date(today);end.setDate(end.getDate()+prefill.suggestedDays-1);
    due=`${end.getFullYear()}-${String(end.getMonth()+1).padStart(2,'0')}-${String(end.getDate()).padStart(2,'0')}`;
  }
  // 사용자 맞춤 정보 입력 칸(설계서 Task 5) — customFields를 "- 필드: " 구조로 desc에 프리필.
  // 기존 prefill.desc가 있으면 그것을 사용, 없으면 customFields로 빌드.
  let desc='';
  if(Array.isArray(tpl.customFields)&&tpl.customFields.length){
    desc=tpl.customFields.map(f=>`- ${f}: `).join('\n');
  } else if(prefill.desc){
    desc=prefill.desc;
  }
  S.lastInput={
    title:prefill.title||tpl.name,
    desc,
    startDate, due,
    wantSplit:true,
    fileName:S.formFile?.name||null,
    fromTemplate:true,   // 이 lastInput은 템플릿에서 프리필된 것 → "이전 입력값을 불러왔어요" 배너 억제
  };
  S.formWantSplit=true;
  closeTemplatePreview();
  rInput(document.getElementById('s-home'));
}

function toggleChunkGuide(id, idx){
  const el=document.getElementById(id);
  if(!el) return;
  const open=el.style.display!=='none';
  el.style.display=open?'none':'block';
  const arrow=document.getElementById(`cg-arrow-${idx}`);
  if(arrow) arrow.style.transform=open?'':'rotate(180deg)';
  const proj=S.curProj;
  if(proj&&proj.chunks?.[idx]) proj.chunks[idx].expanded=!open;
  if(!open){
    const chunk=proj?.chunks?.[idx];
    if(chunk&&!chunk.guide) generateChunkGuide(chunk, idx, proj);
  }
}

function makeFallbackGuide(t, proj){
  const name=(t||'').trim();
  const subject=name.replace(/하기$|작성하기$|작성$|만들기$|정리하기$|정리$|점검하기$|점검$|확인하기$|확인$|구현하기$|구현$|설계하기$|설계$/,'').trim()||name;

  const guideMap=[
    {keys:['기획','아이디어','방향','주제','범위'], text:`이번 단계의 산출물을 먼저 고정해. 예를 들면 한 문단 요약, 비교표 1개, 우선순위 목록 3개처럼 확인 가능한 결과가 남아야 다음 단계로 넘기기 쉽다. 결정이 안 나면 선택 기준부터 적고, 그 기준에 따라 바로 탈락시킬 후보를 정리해.`},
    {keys:['요구사항','명세'], text:`기능 설명보다 사용자 기준 완료 조건을 먼저 적어. "누가 무엇을 할 수 있어야 하는가"를 문장으로 정리한 뒤 필수/선택으로 나누면 범위가 안정된다. 이 단계의 목표는 문서를 길게 쓰는 게 아니라 개발 시작 기준을 만드는 것이다.`},
    {keys:['조사','리서치','분석','자료','참고문헌','시장'], text:`자료를 넓게 읽기 전에 답해야 할 질문 2~3개를 먼저 고정해. 자료마다 핵심 근거를 한 줄씩만 남기고, 실제로 인용하거나 사용할 것만 별도 목록으로 추려. 수집보다 선별이 끝나야 다음 작업 속도가 난다.`},
    {keys:['설계','구조','와이어','ERD','API','플로우','흐름'], text:`완성도 높은 설계보다 바로 구현 가능한 뼈대를 만드는 데 집중해. 화면, 데이터, 액션이 어떻게 연결되는지만 한눈에 보이면 충분하다. 설계가 길어지면 빠진 예외 1~2개만 추가하고 바로 다음 구현 단계로 넘겨.`},
    {keys:['세팅','환경','설치','초기'], text:`지금 단계에서 필요한 실행 환경만 맞추고 바로 동작 확인까지 끝내. 설치 후에는 실행 여부, 핵심 명령어, 에러 해결 내용을 짧게 남겨두면 재설정 비용이 줄어든다. 세팅 문서는 길게 쓰기보다 재현 가능성이 중요하다.`},
    {keys:['구현','개발','코딩','연동','연결','적용'], text:`이 단계의 목표는 예쁜 결과가 아니라 동작 확인이다. 가장 핵심 흐름 하나를 처음부터 끝까지 연결하고, 성공/실패 조건을 직접 눌러서 확인해. 막히면 범위를 줄여 "지금 바로 검증 가능한 한 동작"만 남겨.`},
    {keys:['UI','화면','디자인','스타일','레이아웃','컴포넌트'], text:`디자인보다 정보 우선순위와 클릭 흐름을 먼저 맞춰. 사용자가 첫 화면에서 어디를 눌러야 할지 3초 안에 보이지 않으면 구조를 다시 정리하는 게 낫다. 시각 디테일은 흐름이 자연스러워진 뒤에 다듬어도 늦지 않다.`},
    {keys:['테스트','QA','버그','디버깅','검증'], text:`정상 동작보다 깨질 가능성이 큰 경우를 먼저 확인해. 빈 상태, 긴 텍스트, 반복 클릭, 경계값처럼 자주 문제 나는 조건을 우선 재현하고, 발견한 이슈는 영향도 기준으로 정렬해 처리해. 수정 후에는 같은 시나리오를 다시 돌려 재발 여부까지 확인해.`},
    {keys:['발표','시연','자료','슬라이드'], text:`전달할 메시지를 한 문장으로 먼저 고정하고, 각 장표가 그 문장을 어떻게 뒷받침하는지 점검해. 시연은 가장 가치가 잘 드러나는 흐름부터 보여주고, 리허설에서는 시간 초과 지점만 표시해도 충분해.`},
    {keys:['정리','요약','교정','퇴고','마무리','제출','배포'], text:`새 내용을 더하기보다 누락과 형식 오류를 잡는 단계야. 파일명, 분량, 제출 위치 같은 실수 빈도 높은 항목부터 체크하고, 실제 제출 경로로 한 번 더 확인해.`},
    {keys:['레포트','리포트','보고서','논문','사례분석'], text:`분량과 제출 형식부터 다시 한 번 확인해. 본문은 결론부터 쓰고 근거를 붙이는 순서가 막힘이 적어. 참고문헌 형식은 마지막에 몰아서 정리하면 수정이 줄어.`},
    {keys:['자소서','자기소개서'], text:`항목별로 묻는 게 다르니까 공고에서 핵심 키워드를 먼저 뽑아. 경험을 나열하기보다 문제→행동→결과 순서로 쓰면 읽기 편해. 분량은 마지막에 한 번에 맞추는 게 흐름이 안 끊겨.`},
    {keys:['포트폴리오','포폴'], text:`보여줄 프로젝트를 먼저 정하고, 각각 역할·기술·결과 세 가지만 한 줄씩 정리해봐. 예쁘게 꾸미는 건 구조 잡힌 뒤에 해도 늦지 않아.`},
  ];

  const found = guideMap.find(item => item.keys.some(k => name.includes(k)));
  if(found) return found.text;

  return `${subject}을(를) 시작하기 전에 이 단계가 끝났을 때 뭐가 남아야 하는지 먼저 정해. 막히면 지금 당장 할 수 있는 가장 작은 행동으로 쪼개서 시작해봐.`;
}

function buildSubSteps(t, projName, projDesc){
  const name=(t||'').trim();
  const ctx=`${name} ${projDesc||projName||''}`;
  const clean=name.replace(/하기$|작성하기$|작성$|구현하기$|구현$|정리하기$|정리$|점검하기$|점검$|확인하기$|확인$|설계하기$|설계$|쓰기$|쓰기$/,'').trim()||name;

  // 주제 키워드 추출 (레포트/논문용)
  const topicMatch = (projDesc||'').match(/([가-힣]{2,12}(?:이론|기제|분석|사례|개념|효과|현상))/);
  const topic = topicMatch ? topicMatch[0] : null;
  const pageMatch = (projDesc||'').match(/[Aa]4\s*(\d+)[페p]/) || (projDesc||'').match(/(\d+)\s*페이지/);
  const pages = pageMatch ? `A4 ${pageMatch[1]}p` : null;

  const patterns=[
    {keys:['발표','시연','슬라이드'], steps:[`핵심 메시지 한 줄 정리`,`보여줄 순서 정하기`,`꼭 필요한 내용만 넣기`,`말하면서 넘겨보기`]},
    {keys:['초안','작성','쓰기','본문'], steps: topic
      ? [`${topic} 핵심 주장 한 줄 정리`,`실생활 사례 1~2개 선정`,`사례-이론 연결 문단 쓰기`,`분량 맞추며 다듬기`]
      : [`쓸 내용 키워드로 먼저 나열`,`문단 순서 잡기`,`첫 문단부터 초안 쓰기`,`흐름 확인 후 다듬기`]},
    {keys:['레포트','리포트','보고서','논문'], steps: topic
      ? [`${topic} 개념 한 줄 정리`,`실생활 사례 선정`,`사례 분석 본문 쓰기`,pages?`${pages} 분량 맞추기`:`분량 맞추기`,`참고문헌 정리`]
      : [`분량·제출 형식 재확인`,`목차 순서 잡기`,`핵심 내용부터 쓰기`,`근거·예시 보강`,`파일 형식 점검`]},
    {keys:['목차','구조','개요'], steps:[`전체 흐름 먼저 그리기`,`각 파트 분량 배분`,`빠진 논점 체크`,`소제목 확정`]},
    {keys:['사례','예시'], steps: topic
      ? [`${topic} 해당하는 실생활 상황 떠올리기`,`사례와 이론 연결 포인트 정리`,`구체적 묘사 추가`,`이론 용어로 설명 연결`]
      : [`쓸 사례 2~3개 후보 적기`,`가장 설명하기 쉬운 것 선택`,`구체적으로 서술`,`이론과 연결`]},
    {keys:['공부','시험','복습','과제'], steps:[`오늘 할 범위 정하기`,`핵심 개념 먼저 훑기`,`문제·예제로 확인`,`헷갈린 부분만 다시 정리`]},
    {keys:['조사','리서치','분석','참고문헌'], steps:[`답해야 할 질문 적기`,`자료 범위 좁히기`,`쓸 근거만 추리기`,`자료마다 한 줄 메모`]},
    {keys:['설계','구조','와이어','ERD','API'], steps:[`필요한 기능 범위 정하기`,`기본 구조 초안 잡기`,`연결 흐름 확인`,`빠진 케이스 체크`]},
    {keys:['구현','개발','코딩','연동'], steps:[`핵심 동작 하나 먼저 정하기`,`한 줄기 연결하기`,`직접 눌러서 확인`,`예외 케이스 수정`]},
    {keys:['UI','화면','디자인','레이아웃'], steps:[`정보 우선순위 정리`,`기본 뼈대 만들기`,`클릭 흐름 확인`,`문구·간격 다듬기`]},
    {keys:['퇴고','교정','마무리','제출'], steps:[`빠진 내용 없는지 훑기`,`흐름·문장 다듬기`,`분량·파일 형식 확인`,`제출 경로로 최종 확인`]},
  ];

  const matched = patterns.find(item => item.keys.some(k => ctx.includes(k)));
  let steps = matched ? matched.steps.slice() : [
    `${clean} 핵심 내용 먼저 적기`,
    `중요한 것부터 처리`,
    `중간 결과 확인`,
    `빠진 부분 점검`
  ];

  return Array.from(new Set(steps)).slice(0, 5).map(s => s.replace(/\s+/g,' ').trim());
}

async function generateChunkGuide(chunk, idx, proj){
  const projName = typeof proj === "string" ? proj : proj.name;
  const projDesc = typeof proj === "object" ? (proj.desc||proj.description||"") : "";
  const textEl = document.getElementById(`cg-text-${idx}`);
  if(!textEl || chunk.guide) return;

  // 로딩 표시
  textEl.innerHTML = `<span style="color:var(--mu2);font-size:12px">✦ 실행 가이드 생성 중...</span>`;

  const systemPrompt =
`당신은 할 일의 각 단계를 어떻게 실행할지 짧고 실용적인 가이드를 써주는 도우미입니다.

규칙:
- 2~3문장으로 써. 딱 이 단계에서 해야 할 것만
- 지금 바로 뭘 하면 되는지 구체적으로 알려줘 (막연한 조언, 뻔한 말 금지)
- 프로젝트명과 단계 이름에서 맥락을 파악해 반영해
- 반말(해체)로 써 (예: "~해봐", "~확인해", "~정리해")
- 텍스트만 출력해. JSON, 마크다운 불필요`;

  const userPrompt = `프로젝트: ${projName}${projDesc ? "\n메모: "+projDesc : ""}\n이 단계: ${chunk.t}`;

  try {
    const guide = await callClaude(systemPrompt, userPrompt);
    chunk.guide = guide.trim();
    if(textEl) textEl.innerHTML = esc(chunk.guide);
  } catch(e) {
    console.warn('가이드 생성 실패, fallback:', e);
    chunk.guide = makeFallbackGuide(chunk.t, projName);
    if(textEl) textEl.innerHTML = esc(chunk.guide);
  }
}

async function subSplitChunk(idx, btnEl){
  const proj=S.curProj;
  if(!proj||!proj.chunks?.[idx]) return;
  const chunk=proj.chunks[idx];
  if(chunk.subChunks&&chunk.subChunks.length) return;
  if(btnEl){btnEl.textContent='쪼개는 중...';btnEl.disabled=true;}

  S._detailSubReturn='chunks';
  S._detailSubIdx=idx;
  S._detailSubProjId=proj.id;
  S._detailSubOriginalChunks=JSON.parse(JSON.stringify(proj.chunks));
  S.detailSubMode=true;
  S.homeMode='loading';
  rHome();

  // Claude API로 세부 단계 생성
  const systemPrompt =
`할 일의 한 단계를 더 작은 실행 단계 3~5개로 나눠주세요.
각 세부 단계는 10~30분 안에 완료 가능한 행동이어야 합니다.
JSON만 출력하세요: {"steps":["세부단계1","세부단계2","세부단계3"]}`;

  const userPrompt = `프로젝트: ${proj.name}\n쪼갤 단계: ${chunk.t}`;

  let steps;
  try {
    const raw = await callClaude(systemPrompt, userPrompt);
    const clean = raw.replace(/```json|```/g,'').trim();
    steps = JSON.parse(clean).steps || buildSubSteps(chunk.t, proj.name, proj.desc);
  } catch(e) {
    steps = buildSubSteps(chunk.t, proj.name, proj.desc);
  }

  if(!S.detailSubMode||S._detailSubIdx!==idx||S.curProj!==proj) return;

  proj.chunks=steps.map((t,si)=>({id:`${chunk.id}-s${si}`,t,guide:null,done:false,timeSpent:0}));
  proj.reasoning={
    what:`"${chunk.t}" 단계를 더 작은 행동 단위로 나눴어요.`,
    how:'한 번에 처리하기 부담되지 않도록 준비 → 실행 → 확인 순서로 구성했어요.'
  };
  S.homeMode='chunks';
  rHome();
}

/* 세부 단계 수정 — subChunks를 editChunks 형태로 편집 */
function editSubChunks(idx){
  const proj=S.curProj;
  if(!proj) return;
  const chunk=proj.chunks[idx];
  if(!chunk||!chunk.subChunks) return;
  pushNav();
  S._editSubIdx=idx;
  S._editSubOriginal=JSON.parse(JSON.stringify(chunk.subChunks));
  S.originalChunks=JSON.parse(JSON.stringify(proj.chunks));
  proj.chunks=chunk.subChunks;
  // detailSubMode 중(2단계쪼개기 확정 화면에서 세부단계수정 진입)이면
  // 확정 후 상세 화면으로 바로 복귀해야 하므로 editFromDetail=true
  S.editFromDetail=S.detailSubMode?true:false;
  S.homeMode='editChunks';rHome();
}

/* editChunks 확정 시 subChunks 복원 처리 */
function confirmEditSubChunks(){
  const proj=S.curProj;
  if(!proj||S._editSubIdx==null) return false;
  const idx=S._editSubIdx;
  // 현재 편집된 subChunks 저장
  const editedSubs=proj.chunks.map(c=>({...c}));
  // originalChunks로 복원
  if(S.originalChunks){
    proj.chunks=S.originalChunks.map(c=>({...c}));
    if(proj.chunks[idx]) proj.chunks[idx].subChunks=editedSubs;
  }
  S._editSubIdx=null;
  S._editSubOriginal=null;
  S.originalChunks=null;

  // detailSubMode 중 세부단계 수정이었으면: 서브청크를 _detailSubOriginalChunks에도 반영 후 chunks 화면으로
  // editFromDetail 중 세부단계 수정이었으면: 상세 화면으로 바로 복귀
  if(S.editFromDetail){
    S.editFromDetail=false;
    const returnTarget=S._detailSubReturn||'detail';
    S.detailSubMode=false;
    S._detailSubIdx=null;
    S._detailSubProjId=null;
    S._detailSubOriginalChunks=null;
    S._detailSubReturn=null;
    S.chunksHistory=[];S.reasonOpen=false;
    if(returnTarget==='detail'){
      S.detailProj=proj;S.curProj=null;
      S.allMode='detail';go('all',true);
      return true;
    }
    S.homeMode='chunks';
    rHome();
    return true;
  }

  S.homeMode='chunks';
  rHome();
  return true;
}

function toggleReason(){
  S.reasonOpen=!S.reasonOpen;
  rChunks(document.getElementById('s-home'));
}

// 첫 번째 단계 가이드 자동 로드
function autoLoadFirstGuide(){
  const proj=S.curProj;
  if(!proj||!proj.chunks||!proj.chunks[0]) return;
  const chunk=proj.chunks[0];
  if(!chunk.guide) generateChunkGuide(chunk, 0, proj);
}

function enterEditChunks(){
  pushNav();
  S.originalChunks=JSON.parse(JSON.stringify(S.curProj.chunks));
  S.editFromDetail=false;
  S.homeMode='editChunks';rHome();
}


function esc(s){
  if(s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function confirmChunks(){
  // 세부 단계 편집 문맥이면 subChunks 복원 처리
  if(S._editSubIdx!=null){
    if(confirmEditSubChunks()) return;
  }
  // 상세 화면에서 시작한 2단계 쪼개기 문맥
  if(S.detailSubMode){
    confirmDetailSubChunks();
    return;
  }
  const proj=S.curProj;
  // subChunks가 있는 청크는 flat 변환 없이 그대로 보존
  S.curProj=null;S.curChunk=null;
  S.reasonOpen=false;
  S.chunksHistory=[];
  S.lastInput=null;
  S.selectedTemplate=null;
  S.homeMode='input';
  if(proj){
    S.detailProj=proj;
    S.allMode='detail';
  }
  go('all',true);
}

/* 상세 화면 2단계쪼개기 확정 — subChunks 저장 후 상세 화면 복귀 */
function confirmDetailSubChunks(){
  const proj=S.curProj;
  const chunkIdx=S._detailSubIdx;
  const returnTarget=S._detailSubReturn||'detail';
  if(!proj||chunkIdx==null||!S._detailSubOriginalChunks) return;
  const subChunks=proj.chunks.map(c=>({...c}));
  proj.chunks=S._detailSubOriginalChunks.map(c=>({...c}));
  if(proj.chunks[chunkIdx]) proj.chunks[chunkIdx].subChunks=subChunks;
  S.detailSubMode=false;
  S._detailSubIdx=null;
  S._detailSubProjId=null;
  S._detailSubOriginalChunks=null;
  S._detailSubReturn=null;
  S.chunksHistory=[];S.reasonOpen=false;
  if(returnTarget==='detail'){
    S.detailProj=proj;S.curProj=null;
    S.allMode='detail';go('all',true);
    return;
  }
  S.homeMode='chunks';
  rHome();
}

/* 상세 화면 2단계쪼개기 취소 — 원래 chunks 복원 후 상세 화면 복귀 */
function cancelDetailSubChunks(){
  const proj=S.curProj;
  const returnTarget=S._detailSubReturn||'detail';
  if(proj&&S._detailSubOriginalChunks){
    proj.chunks=S._detailSubOriginalChunks.map(c=>({...c}));
  }
  S.detailSubMode=false;
  S._detailSubIdx=null;
  S._detailSubProjId=null;
  S._detailSubOriginalChunks=null;
  S._detailSubReturn=null;
  S.chunksHistory=[];S.reasonOpen=false;
  if(returnTarget==='detail'){
    S.detailProj=proj;S.curProj=null;
    S.allMode='detail';go('all',true);
    return;
  }
  S.homeMode='chunks';
  rHome();
}

/* ── 방향 조정 재생성 — Claude API 호출 ── */
async function regen(direction){
  if(!S.curProj) return;
  S.chunksHistory.push({
    chunks:JSON.parse(JSON.stringify(S.curProj.chunks)),
    reasoning:Object.assign({},S.curProj.reasoning||{}),
    label:labelForDirection(direction)
  });
  if(S.chunksHistory.length>3) S.chunksHistory.shift();
  S.homeMode='loading'; rHome();

  const currentSteps = S.curProj.chunks.map(c=>c.t);
  const dirLabel = direction==='finer' ? '더 잘게 (결정 부담을 낮춘 단위로)' : '더 크게 (의미 묶음으로)';

  const systemPrompt =
`현재 단계 목록을 "${dirLabel}" 방식으로 다시 나눠주세요.
JSON만 출력: {"chunks":["단계1","단계2"],"how":"어떻게 바꿨는지 1문장"}`;

  const userPrompt =
`프로젝트: ${S.curProj.name}\n현재 단계:\n${currentSteps.map((t,i)=>`${i+1}. ${t}`).join('\n')}`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt);
    const clean = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    let next = (parsed.chunks || []).slice(0, 8);
    if(next.length < 3) next = currentSteps; // fallback
    S.curProj.chunks = next.map((t,i)=>({id:`${S.curProj.id}-r${i}`,t,guide:null,done:false,timeSpent:0}));
    S.curProj.reasoning = {
      what: S.curProj.reasoning?.what||'',
      how: parsed.how || (direction==='finer'?'더 잘게 나눴어요.':'더 크게 묶었어요.')
    };
  } catch(e) {
    // fallback: 로컬 가공
    if(direction==='finer'){
      const expanded=[];
      currentSteps.forEach(t=>{expanded.push(t+' - 준비');expanded.push(t+' - 실행');});
      S.curProj.chunks=expanded.slice(0,8).map((t,i)=>({id:`${S.curProj.id}-r${i}`,t,guide:null,done:false,timeSpent:0}));
      S.curProj.reasoning={what:S.curProj.reasoning?.what||'',how:'결정 부담이 낮은 단위로 더 잘게 나눴어요.'};
    } else {
      const merged=[];
      for(let i=0;i<currentSteps.length;i+=2) merged.push(currentSteps.slice(i,i+2).join(' + '));
      S.curProj.chunks=(merged.length<3?currentSteps.slice(0,3):merged).map((t,i)=>({id:`${S.curProj.id}-r${i}`,t,guide:null,done:false,timeSpent:0}));
      S.curProj.reasoning={what:S.curProj.reasoning?.what||'',how:'의미 묶음으로 크게 합쳤어요.'};
    }
  }
  S.reasonOpen=true;
  S.homeMode='chunks'; rHome();
}

function labelForDirection(d){
  return ({finer:'더 잘게 전',coarser:'더 크게 전',feedback:'피드백 전'})[d]||'이전';
}

/* ── v2: 히스토리 복원 ── */
function restoreHistory(){
  if(S.chunksHistory.length===0) return;
  const prev=S.chunksHistory.pop();
  S.curProj.chunks=prev.chunks.map((c,i)=>({...c,id:`${S.curProj.id}-${i}`}));
  S.curProj.reasoning=prev.reasoning;
  rChunks(document.getElementById('s-home'));
}

/* ── v2: 단일 태스크로 저장 (최후 수단) ── */
function saveAsSingle(){
  if(!S.curProj) return;
  S.curProj.isSingle=true;
  S.curProj.chunks=[{id:`${S.curProj.id}-0`,t:S.curProj.name,done:false,timeSpent:0}];
  S.curProj.reasoning=null;
  confirmChunks();
}

/* v2: chunks 화면 '돌아가기' — 새로 생성한 임시 프로젝트면 제거하고 이전 화면 복원 */
function chunksBack(){
  // 상세 화면에서 시작한 2단계쪼개기 문맥이면 취소 처리로 위임
  if(S.detailSubMode){cancelDetailSubChunks();return;}
  // 쪼개기 결과 화면에서 '돌아가기'는 항상 홈(입력) 화면으로 이동.
  // 아직 확정되지 않은 방금 생성된 프로젝트는 제거하되, 입력값은 lastInput으로 유지됨.
  if(S.curProj){
    S.projects=S.projects.filter(p=>p.id!==S.curProj.id);
  }
  S.curProj=null;
  S.reasonOpen=false;
  S.chunksHistory=[];
  S.navHistory=[];
  S.homeMode='input';
  go('home',true);
}
/* ── v2: 입력값 유지하고 입력 화면으로 (삭제 X) ── */
function backToInputKeep(){
  // 생성된 프로젝트 제거하되 입력값은 lastInput에 유지
  if(S.curProj){
    S.projects=S.projects.filter(p=>p.id!==S.curProj.id);
  }
  S.curProj=null;
  S.reasonOpen=false;
  S.chunksHistory=[];
  S.homeMode='input';rHome();
}

/* ── v2: 피드백 화면 (계층 3) ── */

async function submitFeedback(){
  const fb=document.getElementById('fb-text')?.value.trim();
  if(!fb){alert('피드백을 입력해주세요.');return;}
  S.chunksHistory.push({
    chunks:JSON.parse(JSON.stringify(S.curProj.chunks)),
    reasoning:Object.assign({},S.curProj.reasoning||{}),
    label:'피드백 전'
  });
  if(S.chunksHistory.length>3) S.chunksHistory.shift();
  S.homeMode='loading'; rHome();

  const systemPrompt =
`사용자의 피드백을 반영해서 할 일 단계를 다시 나눠주세요.
JSON만 출력: {"chunks":["단계1","단계2"],"how":"어떻게 바꿨는지 1문장"}`;

  const userPrompt =
`프로젝트: ${S.curProj.name}
현재 단계:\n${S.curProj.chunks.map((c,i)=>`${i+1}. ${c.t}`).join('\n')}
사용자 피드백: ${fb}`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt);
    const clean = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    let next = (parsed.chunks || []).slice(0,8);
    if(next.length < 2) next = S.curProj.chunks.map(c=>c.t);
    S.curProj.chunks = next.map((t,i)=>({id:`${S.curProj.id}-f${i}`,t,guide:null,done:false,timeSpent:0}));
    S.curProj.reasoning = {
      what:`"${fb.length>40?fb.slice(0,40)+'…':fb}" 피드백을 반영했어요.`,
      how: parsed.how || '요청하신 방향에 맞게 단계를 재구성했어요.'
    };
  } catch(e) {
    S.curProj.reasoning={
      what:`피드백을 반영하려 했지만 일시적인 오류가 났어요.`,
      how:'잠시 후 다시 시도해주세요.'
    };
  }
  S.reasonOpen=true;
  S.homeMode='chunks'; rHome();
}

/* ── Edit Chunks ── */

  if(!proj){S.homeMode='input';rInput(el);return;}
  const isSubEdit=S._editSubIdx!=null && !!S.originalChunks;
  const parentChunk=isSubEdit && S.originalChunks[S._editSubIdx]?S.originalChunks[S._editSubIdx]:null;
  const headerHtml=isSubEdit?`
      <div class="edit-context-card">
        <div class="edit-context-label">세부 단계 수정 중</div>
        <div class="edit-context-project">${esc(proj.name)}</div>
        <div class="edit-context-task">${esc(parentChunk?.t||'세부 단계')}</div>
        <div class="edit-context-sub">어떤 프로젝트의 어떤 작업을 쪼개고 있는지 바로 보이도록 현재 수정 대상 작업을 크게 보여줘요.</div>
      </div>
    `:`
      <div>
        <div class="ptitle" style="font-size:20px">단계 수정</div>
        <div class="psub">${esc(proj.name)}</div>
      </div>
    `;
  const bodyHtml=`
      <div class="card" id="edit-list">
        ${proj.chunks.map((c,i)=>`
          <div class="eck" data-idx="${i}">
            <div class="drag-handle" title="드래그로 순서 변경">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4 4h6M4 7h6M4 10h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </div>
            <input value="${esc(c.t)}" onchange="S.curProj.chunks[${i}].t=this.value">
            <button class="eck-del" onclick="delChunk(${i})">✕</button>
          </div>
        `).join('')}
      </div>
      <button class="btn-ol" style="width:100%;text-align:center;border-style:dashed" onclick="addChunk()">+ 단계 추가</button>
    `;

  // 진행 기간 편집 섹션 (Task 6)
  const datesHtml=`
    <div style="margin-bottom:6px">
      <div style="font-size:12px;font-weight:800;color:var(--tx2);padding:0 4px 8px">진행 기간</div>
      <div class="card" style="padding:12px 16px;display:flex;gap:10px;align-items:center">
        <div style="flex:1;display:flex;align-items:center;gap:6px">
          <span style="font-size:12px;color:var(--mu);font-weight:600;white-space:nowrap">시작</span>
          <input class="inp" type="date" id="edit-start-date" value="${proj.startDate||''}" style="font-size:13px" onchange="updateProjDate('startDate',this.value)">
        </div>
        <span style="color:var(--mu2);font-size:12px">~</span>
        <div style="flex:1;display:flex;align-items:center;gap:6px">
          <span style="font-size:12px;color:var(--mu);font-weight:600;white-space:nowrap">마감</span>
          <input class="inp" type="date" id="edit-due-date" value="${proj.due||''}" style="font-size:13px" onchange="updateProjDate('due',this.value)">
        </div>
      </div>

  `;

  el.innerHTML=`
    <div style="flex:1;display:flex;flex-direction:column;padding:24px 22px;gap:14px;overflow-y:auto">
      ${headerHtml}

      ${datesHtml}

      <div style="font-size:12px;font-weight:800;color:var(--tx2);padding:0 4px 8px">단계</div>
      ${bodyHtml}

      <div style="display:flex;flex-direction:column;gap:10px;margin-top:auto;padding-top:8px">
        <button class="btn btn-p" onclick="confirmEditChunks()">확정하기</button>
        <button class="btn-ghost" style="text-align:center;width:100%" onclick="revertEditChunks()">돌아가기</button>

/* Task 6: 수정 화면에서 진행 기간(시작일/마감일) 변경 */
function updateProjDate(field,val){
  const proj=S.curProj;
  if(!proj) return;
  if(field!=='startDate'&&field!=='due') return;
  proj[field]=val||null;
  // 날짜 유효성: 시작 > 마감이면 자동 보정 (빨간 경고보단 조용히)
  if(proj.startDate&&proj.due&&new Date(proj.startDate)>new Date(proj.due)){
    if(field==='startDate') proj.due=proj.startDate;
    else proj.startDate=proj.due;
    // 인풋 값 동기화
    const se=document.getElementById('edit-start-date');
    const de=document.getElementById('edit-due-date');
    if(se) se.value=proj.startDate||'';
    if(de) de.value=proj.due||'';
  }
}


function revertEditChunks(){
  if(S.originalChunks&&S.curProj){
    S.curProj.chunks=JSON.parse(JSON.stringify(S.originalChunks));
  }
  // Task 6: 진행 기간 복원
  if(S.originalDates&&S.curProj){
    S.curProj.startDate=S.originalDates.startDate;
    S.curProj.due=S.originalDates.due;
  }
  S.originalDates=null;
  S.editFromDetail=false;
  goBack();
}

function confirmEditChunks(){
  // 세부 단계 편집 문맥이면 먼저 처리 (originalChunks 초기화 전에!)
  if(S._editSubIdx!=null){
    confirmEditSubChunks();
    return;
  }
  S.originalChunks=null;S.originalDates=null;
  if(S.editFromDetail){
    S.detailProj=S.curProj;S.curProj=null;S.editFromDetail=false;
    S.allMode='detail';go('all',true);
  } else {
    confirmChunks();
  }
}

function delChunk(idx){
  if(S.curProj.chunks.length<=1){alert('최소 1개의 단계가 필요해요.');return;}
  S.curProj.chunks.splice(idx,1);
  S.curProj.chunks.forEach((c,i)=>c.id=`${S.curProj.id}-${i}`);
  rEditChunks(document.getElementById('s-home'));
}

function addChunk(){
  const proj=S.curProj;
  const newId=`${proj.id}-${proj.chunks.length}`;
  proj.chunks.push({id:newId,t:'새로운 단계',done:false,timeSpent:0});
  rEditChunks(document.getElementById('s-home'));
}

function initDragSort(){
  const list=document.getElementById('edit-list');
  if(!list) return;
  let dragIdx=null;
  list.querySelectorAll('.drag-handle').forEach((h,i)=>{
    h.addEventListener('pointerdown',(e)=>{
      e.preventDefault();dragIdx=i;
      const onMove=(ev)=>{
        const rows=[...list.querySelectorAll('.eck')];
        const y=ev.clientY||ev.touches?.[0]?.clientY;
        for(let j=0;j<rows.length;j++){
          const rect=rows[j].getBoundingClientRect();
          if(y<rect.top+rect.height/2&&j!==dragIdx){
            const [item]=S.curProj.chunks.splice(dragIdx,1);
            S.curProj.chunks.splice(j,0,item);
            S.curProj.chunks.forEach((c,k)=>c.id=`${S.curProj.id}-${k}`);
            rEditChunks(document.getElementById('s-home'));
            return;
          }
        }
      };
      const onUp=()=>{document.removeEventListener('pointermove',onMove);document.removeEventListener('pointerup',onUp);};
      document.addEventListener('pointermove',onMove);
      document.addEventListener('pointerup',onUp);
    });
  });
}

/* ── Timer Pick (v2: 분 단위 직접입력 + 슬라이더 + 빠른선택) ── */

  const chip=(n)=>`<button onclick="setTimerMin(${n})" style="padding:10px 18px;border-radius:12px;border:1.5px solid ${totalMin===n?'var(--ac)':'var(--bd)'};background:${totalMin===n?'var(--ac-s)':'var(--sf)'};color:${totalMin===n?'var(--ac-d)':'var(--tx)'};font-family:var(--font-body);font-size:14px;font-weight:800;cursor:pointer">${n}분</button>`;
