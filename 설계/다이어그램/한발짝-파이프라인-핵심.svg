<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 640" font-family="'맑은 고딕', 'Malgun Gothic', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8F3"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <marker id="arrowOrange" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 Z" fill="#FF6B3D"/>
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1400" height="640" fill="url(#bgGrad)"/>

  <text x="60" y="55" font-size="28" font-weight="700" fill="#222">핵심 파이프라인 — 5 단 (통합 설계)</text>
  <text x="60" y="85" font-size="15" fill="#666">입력 1회 → 서버 내부 5단 처리 → 결과 화면 반환. DECOMPOSE 하나의 AI 호출이 분석과 분해를 함께 수행한다.</text>
  <rect x="60" y="95" width="80" height="4" fill="#FF6B3D" rx="2"/>

  <g transform="translate(40,160)">
    <rect width="200" height="180" rx="14" fill="#FF6B3D" filter="url(#softShadow)"/>
    <text x="100" y="30" text-anchor="middle" font-size="11" fill="#FFDDC9" font-weight="600">① STAGE</text>
    <text x="100" y="62" text-anchor="middle" font-size="18" font-weight="700" fill="#FFF">INTAKE</text>
    <text x="100" y="88" text-anchor="middle" font-size="11" fill="#FFE7DC">입력 수용</text>
    <text x="100" y="116" text-anchor="middle" font-size="10" fill="#FFE7DC">텍스트 + 파일 수용</text>
    <text x="100" y="134" text-anchor="middle" font-size="10" fill="#FFE7DC">pdf·docx·txt 추출</text>
    <text x="100" y="152" text-anchor="middle" font-size="10" fill="#FFE7DC">빈 · 과다 입력 차단</text>
    <text x="100" y="170" text-anchor="middle" font-size="10" fill="#FFE7DC">형식 가드레일</text>
  </g>

  <g transform="translate(270,160)">
    <rect width="340" height="180" rx="14" fill="#8B5CF6" filter="url(#softShadow)"/>
    <text x="170" y="30" text-anchor="middle" font-size="11" fill="#E6DBFE" font-weight="600">② STAGE · AI 단일 호출</text>
    <text x="170" y="62" text-anchor="middle" font-size="18" font-weight="700" fill="#FFF">DECOMPOSE</text>
    <text x="170" y="84" text-anchor="middle" font-size="11" fill="#EFE6FF">Claude Haiku 4.5</text>

    <rect x="14" y="96" width="150" height="74" rx="6" fill="#7A4AE0" stroke="#B597F0"/>
    <text x="89" y="112" text-anchor="middle" font-size="10" font-weight="700" fill="#FFF">분석 (Analysis)</text>
    <text x="89" y="128" text-anchor="middle" font-size="9" fill="#EFE6FF">유형 · 목표</text>
    <text x="89" y="144" text-anchor="middle" font-size="9" fill="#EFE6FF">현재 phase</text>
    <text x="89" y="160" text-anchor="middle" font-size="9" fill="#EFE6FF">제약 · 명확화 여부</text>

    <rect x="176" y="96" width="150" height="74" rx="6" fill="#7A4AE0" stroke="#B597F0"/>
    <text x="251" y="112" text-anchor="middle" font-size="10" font-weight="700" fill="#FFF">분해 (Decomposition)</text>
    <text x="251" y="128" text-anchor="middle" font-size="9" fill="#EFE6FF">6 신호로 경계</text>
    <text x="251" y="144" text-anchor="middle" font-size="9" fill="#EFE6FF">3 규칙으로 기술</text>
    <text x="251" y="160" text-anchor="middle" font-size="9" fill="#EFE6FF">예상 시간 · 가이드</text>
  </g>

  <g transform="translate(640,160)">
    <rect width="200" height="180" rx="14" fill="#22A560" filter="url(#softShadow)"/>
    <text x="100" y="30" text-anchor="middle" font-size="11" fill="#D4EFDD" font-weight="600">③ STAGE</text>
    <text x="100" y="62" text-anchor="middle" font-size="18" font-weight="700" fill="#FFF">VALIDATE</text>
    <text x="100" y="88" text-anchor="middle" font-size="11" fill="#E2F4E8">2층 검증</text>
    <text x="100" y="116" text-anchor="middle" font-size="10" fill="#E2F4E8">1층 · 경계 품질</text>
    <text x="100" y="134" text-anchor="middle" font-size="10" fill="#E2F4E8">2층 · 단계 품질 (3 규칙)</text>
    <text x="100" y="152" text-anchor="middle" font-size="10" fill="#E2F4E8">모호·주관 리라이트</text>
    <text x="100" y="170" text-anchor="middle" font-size="10" fill="#E2F4E8">실패 시 1회 재호출</text>
  </g>

  <g transform="translate(870,160)">
    <rect width="200" height="180" rx="14" fill="#22A560" filter="url(#softShadow)"/>
    <text x="100" y="30" text-anchor="middle" font-size="11" fill="#D4EFDD" font-weight="600">④ STAGE</text>
    <text x="100" y="62" text-anchor="middle" font-size="18" font-weight="700" fill="#FFF">PRESENT</text>
    <text x="100" y="88" text-anchor="middle" font-size="11" fill="#E2F4E8">4블록 포장</text>
    <text x="100" y="116" text-anchor="middle" font-size="10" fill="#E2F4E8">결과 · AI 추론</text>
    <text x="100" y="134" text-anchor="middle" font-size="10" fill="#E2F4E8">재분해 · 확정·수정</text>
    <text x="100" y="152" text-anchor="middle" font-size="10" fill="#E2F4E8">DB 기록 (트리 · 로그)</text>
    <text x="100" y="170" text-anchor="middle" font-size="10" fill="#E2F4E8">각 단계 펼침 UI</text>
  </g>

  <g transform="translate(1100,160)">
    <rect width="260" height="180" rx="14" fill="#FFC043" filter="url(#softShadow)"/>
    <text x="130" y="30" text-anchor="middle" font-size="11" fill="#7C5600" font-weight="600">⑤ STAGE · 사용자 주도</text>
    <text x="130" y="62" text-anchor="middle" font-size="18" font-weight="700" fill="#4A3600">REFINE</text>
    <text x="130" y="88" text-anchor="middle" font-size="11" fill="#5A4200">재분해 · 2차 쪼개기 · 직접 수정</text>
    <text x="130" y="116" text-anchor="middle" font-size="10" fill="#5A4200">피드백 담아 재분해</text>
    <text x="130" y="134" text-anchor="middle" font-size="10" fill="#5A4200">1개 단계만 실행 단위로</text>
    <text x="130" y="152" text-anchor="middle" font-size="10" fill="#5A4200">직접 문구 편집</text>
    <text x="130" y="170" text-anchor="middle" font-size="10" fill="#5A4200">접두부 캐시 적중 → 90% 할인</text>
  </g>

  <g stroke="#FF6B3D" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)">
    <line x1="242" y1="250" x2="268" y2="250"/>
    <line x1="612" y1="250" x2="638" y2="250"/>
    <line x1="842" y1="250" x2="868" y2="250"/>
    <line x1="1072" y1="250" x2="1098" y2="250"/>
  </g>

  <g stroke="#FFC043" stroke-width="2.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrowOrange)">
    <path d="M 1230 340 L 1230 380 L 440 380 L 440 340"/>
  </g>
  <text x="835" y="400" text-anchor="middle" font-size="12" fill="#8A4726" font-style="italic">REFINE 루프 — 사용자가 '재분해 / 2차 쪼개기 / 직접 수정' 선택 시 DECOMPOSE로 재진입 (캐시 재사용)</text>

  <g transform="translate(60,430)">
    <rect width="1280" height="190" rx="14" fill="#FFFFFF" stroke="#E6E6E6"/>
    <text x="28" y="36" font-size="16" font-weight="700" fill="#FF6B3D">5단 설계의 핵심</text>
    <text x="28" y="62" font-size="13" fill="#444">  주황(①): INTAKE — 파일 텍스트 추출과 형식 가드레일. AI 호출 없음.</text>
    <text x="28" y="82" font-size="13" fill="#444">  보라(②): DECOMPOSE — Claude Haiku 4.5 단일 호출로 분석(유형·목표·현재 phase·제약)과 분해(6 신호 경계 + 3 규칙 기술)를 함께 산출</text>
    <text x="28" y="102" font-size="13" fill="#444">  초록(③④): VALIDATE · PRESENT — 2층 검증으로 경계·단계 품질을 보강, 단계별 가이드라인을 생성해 4블록으로 포장</text>
    <text x="28" y="122" font-size="13" fill="#444">  노랑(⑤): REFINE — 재분해·2차 쪼개기·직접 수정이 이 단계로 들어와 DECOMPOSE로 재진입, 동일 접두부 캐시 재사용</text>
    <text x="28" y="158" font-size="12" fill="#888" font-style="italic">설계 원칙: 모든 할 일은 규모 분기 없이 동일 5단 파이프라인을 통과한다. 단계 크기는 맥락 기반 의미 분할의 결과이지 파이프라인의 제약이 아니다.</text>
    <text x="28" y="178" font-size="12" fill="#888" font-style="italic">이해와 분해를 분리하지 않는다 — 한 번의 호출이 프로젝트를 이해하면서 동시에 그 이해를 경계 결정에 반영한다.</text>
  </g>
</svg>
